<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup 4 — Kanban Board Schedule Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#F4F5F7;color:#172B4D;line-height:1.5;overflow:hidden;height:100vh;display:flex;flex-direction:column;}
::selection{background:#0052CC;color:#fff;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#C1C7D0;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#A5ADBA;}

:root{
  --c-jazz:#3B82F6;--c-tap:#EC4899;--c-ballet:#A855F7;--c-hiphop:#10B981;
  --c-contemp:#F59E0B;--c-combo:#6366F1;--c-broadway:#F43F5E;--c-acting:#64748B;
  --c-leaps:#D97706;--c-ballroom:#E11D48;--c-team:#14B8A6;--c-voice:#94A3B8;
}

/* HEADER */
.header{background:linear-gradient(135deg,#0052CC 0%,#0747A6 100%);color:#fff;padding:.6rem 1.5rem;display:flex;align-items:center;gap:.75rem;flex-shrink:0;z-index:50;}
.header .logo{font-weight:700;font-size:1rem;white-space:nowrap;}
.header .sep{opacity:.4;font-size:.85rem;}
.header .season{font-size:.82rem;opacity:.85;white-space:nowrap;}
.header .spacer{flex:1;}
.header select{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:4px;padding:.3rem .5rem;font-size:.78rem;font-family:inherit;outline:none;cursor:pointer;}
.header select option{color:#172B4D;background:#fff;}
.hdr-btn{padding:.3rem .65rem;border-radius:4px;font-size:.78rem;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-family:inherit;transition:background .15s;}
.hdr-btn:hover{background:rgba(255,255,255,.2);}
.hdr-btn.primary{background:#fff;color:#0052CC;border-color:#fff;font-weight:600;}
.hdr-btn.primary:hover{background:#DEEBFF;}

/* TABS */
.tabs-bar{display:flex;gap:0;background:#fff;border-bottom:1px solid #DFE1E6;padding:0 1.5rem;flex-shrink:0;}
.tab-btn{padding:.55rem 1rem;font-size:.8rem;font-weight:500;color:#6B778C;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.tab-btn:hover{color:#172B4D;background:#F4F5F7;}
.tab-btn.active{color:#0052CC;border-bottom-color:#0052CC;}

/* TAB CONTENT */
.tab-content{flex:1;overflow:hidden;display:none;}
.tab-content.active{display:flex;flex-direction:column;}

/* KANBAN BOARD */
.board{display:flex;gap:.75rem;flex:1;padding:.75rem;overflow-x:auto;overflow-y:hidden;align-items:flex-start;}
.column{min-width:240px;width:240px;max-height:100%;display:flex;flex-direction:column;background:#EBECF0;border-radius:6px;flex-shrink:0;}
.column.unassigned{background:#DFE1E6;}
.col-header{padding:.55rem .65rem .35rem;display:flex;align-items:center;gap:.4rem;flex-shrink:0;}
.col-header .col-title{font-size:.82rem;font-weight:700;color:#172B4D;}
.col-header .count{background:#DFE1E6;color:#6B778C;font-size:.7rem;font-weight:600;padding:1px 6px;border-radius:10px;min-width:20px;text-align:center;}
.column.unassigned .col-header .count{background:#C1C7D0;}
.col-cards{flex:1;overflow-y:auto;padding:0 .5rem .5rem;display:flex;flex-direction:column;gap:.4rem;}
.col-footer{padding:.35rem .5rem;flex-shrink:0;}
.add-btn{width:100%;padding:.35rem;border:none;background:transparent;color:#6B778C;font-size:.78rem;font-family:inherit;cursor:pointer;border-radius:4px;text-align:left;transition:background .15s;}
.add-btn:hover{background:rgba(9,30,66,.08);color:#172B4D;}

/* Time separator */
.time-sep{font-size:.68rem;font-weight:600;color:#6B778C;padding:.3rem .15rem .1rem;margin-top:.15rem;border-top:1px dashed #C1C7D0;}

/* CARDS */
.card{background:#fff;border-radius:4px;padding:.45rem .55rem;cursor:grab;box-shadow:0 1px 2px rgba(9,30,66,.15);border-left:4px solid #DFE1E6;transition:box-shadow .15s,transform .1s;user-select:none;position:relative;}
.card:hover{box-shadow:0 2px 6px rgba(9,30,66,.2);}
.card.dragging{opacity:.4;transform:rotate(2deg);}
.card .card-name{font-size:.78rem;font-weight:600;color:#172B4D;margin-bottom:.2rem;line-height:1.3;}
.card .card-meta{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;font-size:.7rem;color:#6B778C;}
.card .avatar{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:#fff;flex-shrink:0;}
.card .card-time{font-size:.68rem;color:#6B778C;margin-top:.15rem;}
.card .dur-badge{background:#DFE1E6;color:#6B778C;font-size:.65rem;font-weight:500;padding:0 4px;border-radius:3px;}
.card .style-tag{font-size:.65rem;font-weight:500;padding:0 5px;border-radius:3px;color:#fff;margin-top:.2rem;display:inline-block;}
.card .conflict-warn{color:#DE350B;font-size:.68rem;font-weight:600;margin-top:.15rem;}
.card.unassigned-card{border-left-color:#C1C7D0;background:#F4F5F7;}
.card.unassigned-card .card-name{font-weight:500;font-size:.76rem;}

/* Style border colors */
.card[data-style="jazz"]{border-left-color:var(--c-jazz);}
.card[data-style="tap"]{border-left-color:var(--c-tap);}
.card[data-style="ballet"]{border-left-color:var(--c-ballet);}
.card[data-style="hiphop"]{border-left-color:var(--c-hiphop);}
.card[data-style="contemp"]{border-left-color:var(--c-contemp);}
.card[data-style="combo"]{border-left-color:var(--c-combo);}
.card[data-style="broadway"]{border-left-color:var(--c-broadway);}
.card[data-style="acting"]{border-left-color:var(--c-acting);}
.card[data-style="leaps"]{border-left-color:var(--c-leaps);}
.card[data-style="ballroom"]{border-left-color:var(--c-ballroom);}
.card[data-style="team"]{border-left-color:var(--c-team);}
.card[data-style="voice"]{border-left-color:var(--c-voice);}

/* Style tag bg */
.st[data-s="jazz"]{background:var(--c-jazz);}  .st[data-s="tap"]{background:var(--c-tap);}
.st[data-s="ballet"]{background:var(--c-ballet);}  .st[data-s="hiphop"]{background:var(--c-hiphop);}
.st[data-s="contemp"]{background:var(--c-contemp);}  .st[data-s="combo"]{background:var(--c-combo);}
.st[data-s="broadway"]{background:var(--c-broadway);}  .st[data-s="acting"]{background:var(--c-acting);}
.st[data-s="leaps"]{background:var(--c-leaps);}  .st[data-s="ballroom"]{background:var(--c-ballroom);}
.st[data-s="team"]{background:var(--c-team);}  .st[data-s="voice"]{background:var(--c-voice);}

/* Drop zone */
.col-cards.drag-target{background:rgba(0,82,204,.06);border-radius:4px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(9,30,66,.54);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:6px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(9,30,66,.25);}
.modal-head{padding:1rem 1.25rem .5rem;display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-size:1rem;font-weight:700;}
.modal-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#6B778C;padding:.25rem;}
.modal-body{padding:.5rem 1.25rem 1.25rem;}
.field{margin-bottom:.75rem;}
.field label{display:block;font-size:.78rem;font-weight:600;color:#6B778C;margin-bottom:.25rem;text-transform:uppercase;letter-spacing:.03em;}
.field select,.field input{width:100%;padding:.45rem .6rem;border:1px solid #DFE1E6;border-radius:4px;font-size:.85rem;font-family:inherit;color:#172B4D;outline:none;background:#FAFBFC;}
.field select:focus,.field input:focus{border-color:#0052CC;background:#fff;}
.modal-foot{padding:.75rem 1.25rem;border-top:1px solid #DFE1E6;display:flex;gap:.5rem;justify-content:flex-end;}
.btn{padding:.4rem .85rem;border-radius:4px;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid #DFE1E6;background:#fff;color:#172B4D;font-family:inherit;transition:background .1s;}
.btn:hover{background:#F4F5F7;}
.btn-primary{background:#0052CC;color:#fff;border-color:#0052CC;}
.btn-primary:hover{background:#0747A6;}
.btn-danger{background:#DE350B;color:#fff;border-color:#DE350B;}
.btn-danger:hover{background:#BF2600;}

/* INNER PANELS */
.inner-panel{flex:1;overflow:auto;padding:1rem 1.5rem;}
table.dt{width:100%;border-collapse:collapse;font-size:.8rem;}
table.dt th{text-align:left;padding:.5rem .6rem;background:#F4F5F7;border-bottom:2px solid #DFE1E6;font-weight:600;color:#6B778C;font-size:.75rem;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0;z-index:2;}
table.dt td{padding:.45rem .6rem;border-bottom:1px solid #DFE1E6;vertical-align:middle;}
table.dt tr:hover td{background:#FAFBFC;}

/* Teacher grid */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem;}
.tc{background:#fff;border-radius:6px;padding:.75rem;box-shadow:0 1px 3px rgba(9,30,66,.1);display:flex;gap:.65rem;align-items:flex-start;}
.tc .ta{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0;}
.tc .tn{font-weight:600;font-size:.85rem;}
.tc .td{font-size:.75rem;color:#6B778C;}

/* Availability */
.avail-grid{display:grid;gap:0;border:1px solid #DFE1E6;width:fit-content;user-select:none;}
.avail-cell{width:100px;height:22px;border:1px solid #EBECF0;cursor:pointer;transition:background .1s;}
.avail-cell.available{background:#ABF5D1;}
.avail-cell.unavailable{background:#FAFBFC;}
.avail-cell:hover{outline:2px solid #0052CC;outline-offset:-2px;z-index:1;position:relative;}
.avail-hdr{font-size:.7rem;font-weight:600;color:#6B778C;padding:.25rem .35rem;background:#F4F5F7;border:1px solid #EBECF0;text-align:center;}
.avail-time{font-size:.68rem;color:#6B778C;padding:.15rem .3rem;background:#F4F5F7;border:1px solid #EBECF0;text-align:right;white-space:nowrap;}

/* Conflict list */
.ci{background:#fff;border-left:4px solid #DE350B;padding:.55rem .75rem;border-radius:4px;margin-bottom:.5rem;box-shadow:0 1px 2px rgba(9,30,66,.1);font-size:.82rem;}
.ci strong{color:#DE350B;}

/* Export */
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;max-width:700px;}
.ec{background:#fff;border-radius:6px;padding:1rem;text-align:center;box-shadow:0 1px 3px rgba(9,30,66,.1);cursor:pointer;transition:box-shadow .15s;}
.ec:hover{box-shadow:0 3px 8px rgba(9,30,66,.15);}
.ec .icon{font-size:1.5rem;margin-bottom:.35rem;}
.ec .elbl{font-weight:600;font-size:.85rem;}
.ec .edsc{font-size:.75rem;color:#6B778C;margin-top:.15rem;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Encore Schedule</div>
  <span class="sep">|</span>
  <span class="season">2026-2027 Season</span>
  <div class="spacer"></div>
  <select id="filterTeacher"><option value="">All Teachers</option></select>
  <select id="filterRoom"><option value="">All Rooms</option></select>
  <button class="hdr-btn" onclick="undo()" title="Ctrl+Z">&#8617; Undo</button>
  <button class="hdr-btn" onclick="redo()" title="Ctrl+Y">&#8618; Redo</button>
  <button class="hdr-btn primary" onclick="openAssignModal()">+ Assign Class</button>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" data-tab="schedule">Schedule</button>
  <button class="tab-btn" data-tab="classes">Classes</button>
  <button class="tab-btn" data-tab="teachers">Teachers</button>
  <button class="tab-btn" data-tab="availability">Availability</button>
  <button class="tab-btn" data-tab="conflicts">Conflicts</button>
  <button class="tab-btn" data-tab="export">Export</button>
</div>

<!-- SCHEDULE TAB -->
<div class="tab-content active" id="tab-schedule"><div class="board" id="board"></div></div>

<!-- CLASSES TAB -->
<div class="tab-content" id="tab-classes"><div class="inner-panel">
  <table class="dt" id="classTable"><thead><tr><th>#</th><th>Class Name</th><th>Style</th><th>Duration</th><th>Eligible Teachers</th><th>Assigned</th></tr></thead><tbody></tbody></table>
</div></div>

<!-- TEACHERS TAB -->
<div class="tab-content" id="tab-teachers"><div class="inner-panel"><div class="tg" id="teacherGrid"></div></div></div>

<!-- AVAILABILITY TAB -->
<div class="tab-content" id="tab-availability"><div class="inner-panel">
  <div style="margin-bottom:.75rem;">
    <label style="font-size:.8rem;font-weight:600;color:#6B778C;margin-right:.5rem;">Teacher:</label>
    <select id="availTeacher" style="padding:.35rem .5rem;border:1px solid #DFE1E6;border-radius:4px;font-size:.82rem;font-family:inherit;"></select>
  </div>
  <div id="availWrap"></div>
</div></div>

<!-- CONFLICTS TAB -->
<div class="tab-content" id="tab-conflicts"><div class="inner-panel" id="conflictList"></div></div>

<!-- EXPORT TAB -->
<div class="tab-content" id="tab-export"><div class="inner-panel">
  <h3 style="margin-bottom:.75rem;font-size:1rem;">Export &amp; Data</h3>
  <div class="eg">
    <div class="ec" onclick="exportCSV()"><div class="icon">&#128202;</div><div class="elbl">Export CSV</div><div class="edsc">Download spreadsheet</div></div>
    <div class="ec" onclick="exportJSON()"><div class="icon">&#128203;</div><div class="elbl">Export JSON</div><div class="edsc">Full state backup</div></div>
    <div class="ec" onclick="importJSON()"><div class="icon">&#128229;</div><div class="elbl">Import JSON</div><div class="edsc">Restore from backup</div></div>
    <div class="ec" onclick="resetSchedule()"><div class="icon">&#128465;&#65039;</div><div class="elbl">Reset Schedule</div><div class="edsc">Clear all assignments</div></div>
  </div>
</div></div>

<!-- ASSIGN MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Assign Class</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Class</label><select id="mClass"></select></div>
      <div class="field"><label>Teacher</label><select id="mTeacher"></select></div>
      <div class="field"><label>Day</label><select id="mDay"></select></div>
      <div class="field"><label>Start Time</label><select id="mTime"></select></div>
      <div class="field"><label>Room</label><select id="mRoom"></select></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modalDel" onclick="deleteAssignment()" style="display:none;">Remove</button>
      <button class="btn btn-primary" onclick="saveAssignment()">Save</button>
    </div>
  </div>
</div>

<script src="core.js"></script>
<script>
/* ============================================= */
/* KANBAN BOARD — Mockup 4                       */
/* ============================================= */
let editIdx = -1, dragIdx = -1, fTeacher = '', fRoom = '';
let availPaint = false, availVal = true;

const SC = {
  jazz:'#3B82F6',tap:'#EC4899',ballet:'#A855F7',hiphop:'#10B981',
  contemp:'#F59E0B',combo:'#6366F1',broadway:'#F43F5E',acting:'#64748B',
  leaps:'#D97706',ballroom:'#E11D48',team:'#14B8A6',voice:'#94A3B8'
};

// --- TABS ---
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    renderAll();
  });
});

// --- RENDER ALL ---
function renderAll() {
  renderBoard();
  renderClassesTab();
  renderTeachersTab();
  renderConflictsTab();
  renderAvailability();
}

// --- KANBAN BOARD ---
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let d = 0; d < 6; d++) board.appendChild(buildColumn(d));
  board.appendChild(buildUnassignedCol());
}

function schedForDay(day) {
  const items = [];
  state.schedule.forEach((s, idx) => {
    if (s.day !== day) return;
    if (fTeacher && s.teacherId !== fTeacher) return;
    if (fRoom && s.room !== parseInt(fRoom)) return;
    const cls = CLASSES.find(c => c.id === s.classId);
    if (cls) items.push({ ...s, idx, cls });
  });
  return items.sort((a, b) => a.startTime - b.startTime);
}

function buildColumn(day) {
  const items = schedForDay(day);
  const col = el('div', 'column');
  col.dataset.day = day;

  const hdr = el('div', 'col-header');
  hdr.innerHTML = '<span class="col-title">' + DAYS[day] + '</span><span class="count">' + items.length + '</span>';
  col.appendChild(hdr);

  const cards = el('div', 'col-cards');
  cards.dataset.day = day;
  cards.addEventListener('dragover', e => { e.preventDefault(); cards.classList.add('drag-target'); });
  cards.addEventListener('dragleave', () => cards.classList.remove('drag-target'));
  cards.addEventListener('drop', e => { e.preventDefault(); cards.classList.remove('drag-target'); handleDrop(day); });

  let lastTime = -1;
  items.forEach(item => {
    if (item.startTime !== lastTime) {
      lastTime = item.startTime;
      const sep = el('div', 'time-sep');
      sep.textContent = minutesToTime(item.startTime);
      cards.appendChild(sep);
    }
    cards.appendChild(buildCard(item));
  });
  col.appendChild(cards);

  const foot = el('div', 'col-footer');
  const ab = el('button', 'add-btn');
  ab.textContent = '+ Add class';
  ab.onclick = () => openAssignModal(day);
  foot.appendChild(ab);
  col.appendChild(foot);
  return col;
}

function buildCard(item) {
  const card = el('div', 'card');
  card.dataset.style = item.cls.style;
  card.dataset.idx = item.idx;
  card.draggable = true;

  const t = teacherById(item.teacherId);
  const endTime = item.startTime + item.cls.duration;
  const conflict = isConflict(item.idx);

  card.innerHTML =
    '<div class="card-name">' + esc(item.cls.name) + '</div>' +
    '<div class="card-meta">' +
      '<span class="avatar" style="background:' + (t ? t.color : '#999') + '">' + teacherInitials(item.teacherId) + '</span>' +
      '<span>' + teacherShort(item.teacherId) + '</span>' +
      '<span>&middot; Rm ' + item.room + '</span>' +
      '<span class="dur-badge">' + item.cls.duration + 'm</span>' +
    '</div>' +
    '<div class="card-time">' + minutesToTime(item.startTime) + ' &ndash; ' + minutesToTime(endTime) + '</div>' +
    '<div><span class="style-tag st" data-s="' + item.cls.style + '">' + STYLES[item.cls.style] + '</span></div>' +
    (conflict ? '<div class="conflict-warn">&#9888; Conflict</div>' : '');

  card.addEventListener('click', e => { if (!e.defaultPrevented) openEditModal(item.idx); });
  card.addEventListener('contextmenu', e => {
    e.preventDefault();
    if (confirm('Remove "' + item.cls.name + '" from ' + DAYS[item.day] + '?')) {
      pushUndo(); state.schedule.splice(item.idx, 1); saveState(); renderAll(); toast('Class removed');
    }
  });
  card.addEventListener('dragstart', e => {
    dragIdx = item.idx; card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(item.idx));
  });
  card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragIdx = -1; });
  return card;
}

function buildUnassignedCol() {
  let un = getUnassigned();
  if (fTeacher) un = un.filter(c => c.eligibleTeachers.includes(fTeacher));
  const col = el('div', 'column unassigned');
  const hdr = el('div', 'col-header');
  hdr.innerHTML = '<span class="col-title">Unassigned</span><span class="count">' + un.length + '</span>';
  col.appendChild(hdr);
  const cards = el('div', 'col-cards');
  un.forEach(cls => {
    const card = el('div', 'card unassigned-card');
    card.dataset.style = cls.style;
    card.innerHTML =
      '<div class="card-name">' + esc(cls.name) + '</div>' +
      '<div class="card-meta">' +
        '<span class="dur-badge">' + cls.duration + 'm</span>' +
        '<span class="style-tag st" data-s="' + cls.style + '">' + STYLES[cls.style] + '</span>' +
      '</div>';
    card.addEventListener('click', () => openAssignModal(-1, cls.id));
    cards.appendChild(card);
  });
  col.appendChild(cards);
  return col;
}

function handleDrop(targetDay) {
  if (dragIdx < 0 || dragIdx >= state.schedule.length) return;
  const entry = state.schedule[dragIdx];
  if (entry.day === targetDay) return;
  pushUndo();
  entry.day = targetDay;
  const cls = CLASSES.find(c => c.id === entry.classId);
  if (cls) {
    const mx = targetDay === 5 ? SAT_END - cls.duration : WEEKDAY_END - cls.duration;
    const mn = targetDay === 5 ? SAT_START : WEEKDAY_START;
    if (entry.startTime > mx) entry.startTime = mx;
    if (entry.startTime < mn) entry.startTime = mn;
    entry.startTime = Math.round(entry.startTime / SLOT_MINUTES) * SLOT_MINUTES;
  }
  saveState(); renderAll(); toast('Moved to ' + DAYS[targetDay]);
}

// --- MODAL ---
function openAssignModal(preDay, preClassId) {
  editIdx = -1;
  document.getElementById('modalTitle').textContent = 'Assign Class';
  document.getElementById('modalDel').style.display = 'none';
  populateModal(preDay !== undefined ? preDay : -1, preClassId);
  document.getElementById('modal').classList.add('open');
}

function openEditModal(idx) {
  editIdx = idx;
  const entry = state.schedule[idx];
  document.getElementById('modalTitle').textContent = 'Edit Assignment';
  document.getElementById('modalDel').style.display = '';
  populateModal(entry.day, entry.classId, entry);
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); editIdx = -1; }

function populateModal(preDay, preClassId, entry) {
  const mC = document.getElementById('mClass');
  const avail = editIdx >= 0 ? CLASSES : getUnassigned();
  mC.innerHTML = avail.map(c => '<option value="' + c.id + '"' + (c.id === preClassId ? ' selected' : '') + '>' + c.name + ' (' + c.duration + 'm)</option>').join('');

  const mD = document.getElementById('mDay');
  mD.innerHTML = DAYS.map((d, i) => '<option value="' + i + '"' + (preDay >= 0 && i === preDay ? ' selected' : '') + '>' + d + '</option>').join('');

  const mR = document.getElementById('mRoom');
  mR.innerHTML = [1,2,3,4,5].map(r => '<option value="' + r + '"' + (entry && entry.room === r ? ' selected' : '') + '>Room ' + r + '</option>').join('');

  updateModalTeachers(entry);
  updateModalTimes(entry);
  mC.onchange = () => { updateModalTeachers(); updateModalTimes(); };
  mD.onchange = () => updateModalTimes(entry);
}

function updateModalTeachers(entry) {
  const cid = parseInt(document.getElementById('mClass').value);
  const cls = CLASSES.find(c => c.id === cid);
  const elig = cls ? cls.eligibleTeachers : TEACHERS.map(t => t.id);
  document.getElementById('mTeacher').innerHTML = elig.map(tid => {
    const t = teacherById(tid);
    return '<option value="' + tid + '"' + (entry && entry.teacherId === tid ? ' selected' : '') + '>' + (t ? t.name : tid) + '</option>';
  }).join('');
}

function updateModalTimes(entry) {
  const day = parseInt(document.getElementById('mDay').value);
  const s = day === 5 ? SAT_START : WEEKDAY_START;
  const e = day === 5 ? SAT_END : WEEKDAY_END;
  let h = '';
  for (let t = s; t < e; t += SLOT_MINUTES)
    h += '<option value="' + t + '"' + (entry && entry.startTime === t ? ' selected' : '') + '>' + minutesToTime(t) + '</option>';
  document.getElementById('mTime').innerHTML = h;
}

function saveAssignment() {
  const classId = parseInt(document.getElementById('mClass').value);
  const teacherId = document.getElementById('mTeacher').value;
  const day = parseInt(document.getElementById('mDay').value);
  const startTime = parseInt(document.getElementById('mTime').value);
  const room = parseInt(document.getElementById('mRoom').value);
  pushUndo();
  if (editIdx >= 0) state.schedule[editIdx] = { classId, teacherId, day, startTime, room };
  else state.schedule.push({ classId, teacherId, day, startTime, room });
  saveState(); closeModal(); renderAll();
  toast(editIdx >= 0 ? 'Assignment updated' : 'Class assigned');
}

function deleteAssignment() {
  if (editIdx < 0) return;
  pushUndo(); state.schedule.splice(editIdx, 1);
  saveState(); closeModal(); renderAll(); toast('Assignment removed');
}

// --- CLASSES TAB ---
function renderClassesTab() {
  const tbody = document.querySelector('#classTable tbody');
  tbody.innerHTML = CLASSES.map(c => {
    const a = state.schedule.find(s => s.classId === c.id);
    const tns = c.eligibleTeachers.map(tid => teacherShort(tid)).join(', ');
    const st = a ? '<span style="color:#10B981;font-weight:500;">' + DAYS[a.day] + ' ' + minutesToTime(a.startTime) + '</span>' : '<span style="color:#6B778C;">&mdash;</span>';
    return '<tr><td>' + c.id + '</td><td>' + esc(c.name) + '</td><td><span class="style-tag st" data-s="' + c.style + '">' + STYLES[c.style] + '</span></td><td>' + c.duration + 'm</td><td style="font-size:.75rem;">' + tns + '</td><td>' + st + '</td></tr>';
  }).join('');
}

// --- TEACHERS TAB ---
function renderTeachersTab() {
  document.getElementById('teacherGrid').innerHTML = TEACHERS.map(t => {
    const cnt = state.schedule.filter(s => s.teacherId === t.id).length;
    const stls = t.styles.map(s => '<span class="style-tag st" data-s="' + s + '" style="margin-right:2px;">' + STYLES[s] + '</span>').join('');
    return '<div class="tc"><div class="ta" style="background:' + t.color + '">' + teacherInitials(t.id) + '</div><div><div class="tn">' + esc(t.name) + '</div><div class="td">' + cnt + ' class' + (cnt !== 1 ? 'es' : '') + ' assigned</div><div style="margin-top:.25rem;">' + stls + '</div></div></div>';
  }).join('');
}

// --- AVAILABILITY TAB ---
function renderAvailability() {
  const sel = document.getElementById('availTeacher');
  if (!sel.children.length) {
    sel.innerHTML = TEACHERS.map(t => '<option value="' + t.id + '">' + t.name + '</option>').join('');
    sel.onchange = renderAvailability;
  }
  const tid = sel.value;
  const wrap = document.getElementById('availWrap');
  let h = '<div class="avail-grid" style="grid-template-columns:80px repeat(6,100px);">';
  h += '<div class="avail-hdr"></div>';
  for (let d = 0; d < 6; d++) h += '<div class="avail-hdr">' + DAY_SHORT[d] + '</div>';
  TIME_SLOTS.forEach(time => {
    h += '<div class="avail-time">' + minutesToTime(time) + '</div>';
    for (let d = 0; d < 6; d++) {
      if (!isTimeInDay(time, d)) {
        h += '<div class="avail-cell" style="background:#EBECF0;cursor:default;"></div>';
      } else {
        const av = isAvailable(tid, d, time);
        h += '<div class="avail-cell ' + (av ? 'available' : 'unavailable') + '" data-tid="' + tid + '" data-day="' + d + '" data-time="' + time + '"></div>';
      }
    }
  });
  h += '</div>';
  wrap.innerHTML = h;

  wrap.querySelectorAll('.avail-cell[data-tid]').forEach(cell => {
    cell.addEventListener('mousedown', e => {
      e.preventDefault(); availPaint = true;
      availVal = !cell.classList.contains('available');
      toggleAvail(cell);
    });
    cell.addEventListener('mouseenter', () => { if (availPaint) toggleAvail(cell); });
  });
}

function toggleAvail(cell) {
  const tid = cell.dataset.tid, day = +cell.dataset.day, time = +cell.dataset.time;
  if (availVal) { cell.classList.add('available'); cell.classList.remove('unavailable'); addAvailSlot(tid, day, time); }
  else { cell.classList.remove('available'); cell.classList.add('unavailable'); removeAvailSlot(tid, day, time); }
  saveState();
}

function addAvailSlot(tid, day, time) {
  if (!state.availability[tid]) state.availability[tid] = {};
  if (!state.availability[tid][day]) state.availability[tid][day] = [];
  const sl = state.availability[tid][day];
  for (const s of sl) {
    if (time >= s.start && time < s.end) return;
    if (time === s.end) { s.end += SLOT_MINUTES; mergeSlots(sl); return; }
    if (time + SLOT_MINUTES === s.start) { s.start = time; mergeSlots(sl); return; }
  }
  sl.push({ start: time, end: time + SLOT_MINUTES }); mergeSlots(sl);
}

function removeAvailSlot(tid, day, time) {
  if (!state.availability[tid]?.[day]) return;
  const sl = state.availability[tid][day];
  for (let i = sl.length - 1; i >= 0; i--) {
    const s = sl[i];
    if (time >= s.start && time < s.end) {
      if (time === s.start) { s.start += SLOT_MINUTES; if (s.start >= s.end) sl.splice(i, 1); }
      else if (time + SLOT_MINUTES === s.end) { s.end = time; }
      else { sl.push({ start: time + SLOT_MINUTES, end: s.end }); s.end = time; }
      return;
    }
  }
}

function mergeSlots(sl) {
  sl.sort((a, b) => a.start - b.start);
  for (let i = sl.length - 2; i >= 0; i--) {
    if (sl[i].end >= sl[i + 1].start) { sl[i].end = Math.max(sl[i].end, sl[i + 1].end); sl.splice(i + 1, 1); }
  }
}

document.addEventListener('mouseup', () => { availPaint = false; });

// --- CONFLICTS TAB ---
function renderConflictsTab() {
  const list = document.getElementById('conflictList');
  const cc = getConflicts();
  if (!cc.length) { list.innerHTML = '<div style="color:#6B778C;font-size:.85rem;padding:1rem 0;">&#10003; No scheduling conflicts detected.</div>'; return; }
  list.innerHTML = '<h3 style="margin-bottom:.75rem;font-size:1rem;color:#DE350B;">&#9888; ' + cc.length + ' Conflict' + (cc.length !== 1 ? 's' : '') + '</h3>' +
    cc.map(c => {
      const a = state.schedule[c.a], b = state.schedule[c.b];
      const ca = CLASSES.find(x => x.id === a.classId), cb = CLASSES.find(x => x.id === b.classId);
      return '<div class="ci"><strong>' + (c.type === 'teacher' ? '&#128100;' : '&#127968;') + ' ' + c.msg + '</strong><div style="font-size:.78rem;color:#6B778C;margin-top:.2rem;">' + DAYS[a.day] + ': ' + (ca ? ca.name : '?') + ' (' + minutesToTime(a.startTime) + ') vs ' + (cb ? cb.name : '?') + ' (' + minutesToTime(b.startTime) + ')</div></div>';
    }).join('');
}

// --- FILTERS ---
function initFilters() {
  const ft = document.getElementById('filterTeacher');
  ft.innerHTML = '<option value="">All Teachers</option>' + TEACHERS.map(t => '<option value="' + t.id + '">' + t.short + '</option>').join('');
  ft.onchange = () => { fTeacher = ft.value; renderAll(); };
  const fr = document.getElementById('filterRoom');
  fr.innerHTML = '<option value="">All Rooms</option>' + [1,2,3,4,5].map(r => '<option value="' + r + '">Room ' + r + '</option>').join('');
  fr.onchange = () => { fRoom = fr.value; renderAll(); };
}

// --- IMPORT JSON ---
function importJSON() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        pushUndo();
        if (d.schedule) state.schedule = d.schedule;
        if (d.availability) state.availability = d.availability;
        saveState(); renderAll(); toast('Schedule imported');
      } catch (err) { toast('Invalid JSON file'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

// --- KEYBOARD ---
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
});

// --- HELPERS ---
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }

// --- INIT ---
loadState();
seedFromTab3();
initFilters();
renderAll();
</script>
