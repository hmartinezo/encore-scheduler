<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encore Schedule Builder &#8212; 2026-2027</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sidebar-bg: #0F172A;
  --sidebar-hover: #1E293B;
  --sidebar-text: #94A3B8;
  --sidebar-active: #3B82F6;
  --bg: #F1F5F9;
  --card: #fff;
  --border: #E2E8F0;
  --border-light: #F1F5F9;
  --text: #1E293B;
  --text-secondary: #64748B;
  --text-muted: #94A3B8;
  --primary: #3B82F6;
  --primary-hover: #2563EB;
  --danger: #EF4444;
  --success: #22C55E;
  --warning: #F59E0B;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; font-size:13px; }
button { font-family:inherit; cursor:pointer; }
select, input { font-family:inherit; }

/* ===== SIDEBAR ===== */
.sidebar { width:240px; background:var(--sidebar-bg); color:var(--sidebar-text); display:flex; flex-direction:column; flex-shrink:0; }
.brand { padding:1rem 1.2rem; border-bottom:1px solid #1E293B; }
.brand h1 { font-size:.82rem; font-weight:700; color:#fff; letter-spacing:.5px; text-transform:uppercase; }
.brand span { font-size:.62rem; color:#475569; display:block; margin-top:2px; }
.sidebar nav { padding:.5rem 0; }
.nav-item { display:flex; align-items:center; gap:.6rem; padding:.55rem 1.2rem; color:var(--sidebar-text); text-decoration:none; font-size:.78rem; font-weight:500; cursor:pointer; border-left:3px solid transparent; transition:all .12s; }
.nav-item:hover { color:#E2E8F0; background:var(--sidebar-hover); }
.nav-item.active { color:#fff; background:var(--sidebar-hover); border-left-color:var(--sidebar-active); }
.nav-item .badge { background:var(--danger); color:#fff; font-size:.58rem; padding:1px 5px; border-radius:8px; margin-left:auto; }
.nav-item .count { color:#475569; font-size:.65rem; margin-left:auto; }

.sidebar-footer { padding:.75rem 1.2rem; border-top:1px solid #1E293B; font-size:.68rem; color:#475569; line-height:1.6; flex-shrink:0; }

/* ===== MAIN ===== */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* ===== TOPBAR ===== */
.topbar { background:var(--card); border-bottom:1px solid var(--border); padding:.6rem 1.25rem; display:flex; align-items:center; gap:.75rem; flex-shrink:0; }
.topbar h2 { font-size:1rem; font-weight:700; margin-right:auto; }
.topbar select { padding:.35rem .6rem; border:1px solid var(--border); border-radius:5px; font-size:.78rem; background:#fff; }
.btn { padding:.35rem .75rem; border-radius:5px; font-size:.78rem; font-weight:600; border:none; transition:all .12s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-hover); }
.btn-outline { background:#fff; color:var(--text-secondary); border:1px solid var(--border); }
.btn-outline:hover { background:#F8FAFC; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { background:#DC2626; }
.btn-sm { padding:.25rem .5rem; font-size:.7rem; }
.btn-warning { background:var(--warning); color:#fff; }
.btn-warning:hover { background:#D97706; }
.btn-muted { background:#E2E8F0; color:var(--text-secondary); }
.btn-muted:hover { background:#CBD5E1; }

/* ===== CONTENT ===== */
.content { flex:1; display:flex; overflow:hidden; }

/* ===== CALENDAR ===== */
.calendar-wrap { flex:1; overflow:auto; padding:.75rem; }
.cal-grid { display:grid; grid-template-columns:56px repeat(6,1fr); border:1px solid var(--border); border-radius:6px; background:var(--card); min-width:750px; }
.cal-header { background:#F8FAFC; font-size:.68rem; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text-secondary); padding:.4rem; text-align:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
.cal-time { font-size:.6rem; color:var(--text-muted); padding:.2rem .3rem; text-align:right; border-right:1px solid var(--border); height:28px; display:flex; align-items:flex-start; justify-content:flex-end; }
.cal-time.hour-mark { font-weight:600; color:var(--text-secondary); }
.cal-cell { border-right:1px solid var(--border-light); border-bottom:1px solid var(--border-light); height:28px; position:relative; cursor:pointer; transition:background .08s; }
.cal-cell:hover { background:#F0F9FF; }
.cal-cell.drop-target { background:#DBEAFE !important; }
.cal-cell.unavailable { background:#F8F8F8; cursor:default; }
.cal-cell.unavailable:hover { background:#F8F8F8; }

/* ===== CLASS BLOCKS ===== */
.class-block { position:absolute; left:1px; right:1px; border-radius:3px; padding:1px 4px; font-size:.58rem; font-weight:500; overflow:hidden; cursor:grab; z-index:2; line-height:1.2; border-left:3px solid; transition:box-shadow .12s; }
.class-block:hover { box-shadow:0 2px 8px rgba(0,0,0,.15); z-index:5; }
.class-block.dragging { opacity:.5; }
.class-block .cb-name { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.class-block .cb-teacher { opacity:.7; font-size:.55rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.class-block .cb-room { opacity:.5; font-size:.5rem; }
.class-block.conflict { outline:2px solid var(--danger); outline-offset:-1px; animation:pulse-red 1.5s infinite; }
@keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.2)} 50%{box-shadow:0 0 0 4px rgba(239,68,68,.1)} }

/* Style colors */
.style-jazz { background:#DBEAFE; color:#1E40AF; border-color:#3B82F6; }
.style-tap { background:#FCE7F3; color:#9D174D; border-color:#EC4899; }
.style-ballet { background:#F3E8FF; color:#6B21A8; border-color:#A855F7; }
.style-hiphop { background:#D1FAE5; color:#065F46; border-color:#10B981; }
.style-contemp { background:#FEF3C7; color:#92400E; border-color:#F59E0B; }
.style-combo { background:#E0E7FF; color:#3730A3; border-color:#6366F1; }
.style-broadway { background:#FFE4E6; color:#9F1239; border-color:#F43F5E; }
.style-acting { background:#F1F5F9; color:#475569; border-color:#64748B; }
.style-voice { background:#F1F5F9; color:#475569; border-color:#94A3B8; }
.style-ballroom { background:#FECDD3; color:#881337; border-color:#E11D48; }
.style-team { background:#CCFBF1; color:#134E4A; border-color:#14B8A6; }
.style-leaps { background:#FEF3C7; color:#78350F; border-color:#D97706; }

/* Half-width blocks for parallel classes */
.class-block.col-left { right:51%; }
.class-block.col-right { left:51%; }
.class-block.col-third-1 { right:67%; }
.class-block.col-third-2 { left:34%; right:34%; }
.class-block.col-third-3 { left:67%; }

/* ===== TEACHERS TAB ===== */
.teachers-view { flex:1; overflow:auto; padding:1rem; }
.teacher-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:.75rem; }
.teacher-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:1rem; cursor:pointer; transition:border-color .15s, box-shadow .15s; }
.teacher-card:hover { border-color:var(--primary); box-shadow:0 2px 8px rgba(59,130,246,.12); }
.teacher-card h3 { font-size:.85rem; font-weight:600; margin-bottom:.5rem; display:flex; align-items:center; gap:.5rem; }
.teacher-card .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.teacher-card .styles { display:flex; flex-wrap:wrap; gap:.25rem; margin-top:.5rem; }
.teacher-card .style-tag { font-size:.62rem; padding:.15rem .4rem; border-radius:3px; font-weight:500; }
.teacher-card .stat { font-size:.7rem; color:var(--text-secondary); margin-top:.5rem; }

/* ===== CLASSES TAB ===== */
.classes-view { flex:1; overflow:auto; padding:1rem; }
.classes-table { width:100%; border-collapse:collapse; background:var(--card); border-radius:8px; overflow:hidden; border:1px solid var(--border); min-width:700px; }
.classes-table th { background:#F8FAFC; font-size:.7rem; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text-secondary); padding:.5rem .6rem; text-align:left; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5; }
.classes-table td { padding:.35rem .6rem; border-bottom:1px solid var(--border-light); font-size:.75rem; }
.classes-table tr:hover { background:#F0F9FF; cursor:pointer; }

/* ===== AVAILABILITY TAB ===== */
.avail-view { flex:1; overflow:auto; padding:1rem; }
.avail-controls { display:flex; gap:.75rem; align-items:center; margin-bottom:.75rem; flex-wrap:wrap; }
.avail-summary { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:.6rem .85rem; margin-bottom:.75rem; font-size:.78rem; color:var(--text); }
.avail-summary-row { display:flex; flex-wrap:wrap; align-items:center; gap:.35rem; padding:.2rem 0; }
.avail-summary-row + .avail-summary-row { border-top:1px solid var(--border-light); margin-top:.3rem; padding-top:.4rem; }
.avail-summary-label { font-weight:700; font-size:.65rem; text-transform:uppercase; letter-spacing:.5px; min-width:65px; flex-shrink:0; }
.avail-day-pill { display:inline-flex; align-items:center; gap:.35rem; border-radius:16px; padding:.2rem .55rem; font-size:.7rem; white-space:nowrap; }
.avail-day-pill.type-available { background:#F0FDF4; border:1px solid #BBF7D0; }
.avail-day-pill.type-available strong { color:#15803D; }
.avail-day-pill.type-available span { color:#166534; }
.avail-day-pill.type-teaching { background:#EFF6FF; border:1px solid #BFDBFE; }
.avail-day-pill.type-teaching strong { color:#1D4ED8; }
.avail-day-pill.type-teaching span { color:#1E40AF; }
.avail-legend { display:flex; gap:1rem; align-items:center; margin-bottom:.5rem; font-size:.65rem; color:var(--text-muted); }
.avail-legend-item { display:flex; align-items:center; gap:.3rem; }
.avail-legend-swatch { width:14px; height:14px; border-radius:3px; border:1px solid var(--border-light); }
.avail-grid { display:grid; border:1px solid var(--border); border-radius:6px; background:var(--card); min-width:500px; }
.avail-cell { border-right:1px solid var(--border-light); border-bottom:1px solid var(--border-light); height:20px; cursor:pointer; transition:background .08s; }
.avail-cell.available { background:#D1FAE5; }
.avail-cell.available:hover { background:#A7F3D0; }
.avail-cell.teaching { background:#3B82F6; }
.avail-cell.teaching:hover { background:#2563EB; }
.avail-cell:hover { background:#F0F9FF; }
.avail-header { background:#F8FAFC; font-size:.66rem; font-weight:600; color:var(--text-secondary); padding:.35rem; text-align:center; border-bottom:1px solid var(--border); cursor:default; }
.avail-header.sat-toggle { cursor:pointer; user-select:none; }
.avail-header.sat-toggle:hover { background:#E2E8F0; }

/* ===== MODAL ===== */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); z-index:100; display:none; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:#fff; border-radius:8px; padding:1.25rem; min-width:380px; max-width:520px; max-height:85vh; overflow-y:auto; box-shadow:0 8px 30px rgba(0,0,0,.2); }
.modal h3 { font-size:.95rem; font-weight:700; margin-bottom:1rem; }
.modal label { display:block; font-size:.75rem; font-weight:500; margin-bottom:.25rem; color:var(--text-secondary); }
.modal select, .modal input[type=text], .modal input[type=color] { width:100%; padding:.4rem .6rem; border:1px solid var(--border); border-radius:5px; font-size:.78rem; margin-bottom:.75rem; }
.modal input[type=color] { height:36px; padding:2px; cursor:pointer; }
.modal .modal-actions { display:flex; gap:.5rem; justify-content:flex-end; margin-top:1rem; }
.modal .checkbox-group { display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:.75rem; }
.modal .checkbox-group label { display:inline-flex; align-items:center; gap:.3rem; font-size:.72rem; padding:.2rem .5rem; border:1px solid var(--border); border-radius:4px; cursor:pointer; }
.modal .checkbox-group label:has(input:checked) { background:#EFF6FF; border-color:var(--primary); color:var(--primary); }
.modal .checkbox-group input[type=checkbox] { width:auto; margin:0; }

/* ===== CONFLICT IGNORED ===== */
.conflict-ignored { opacity:.5; background:#F8FAFC; }
.conflict-ignored td { text-decoration:line-through; }

/* ===== AI OPTIMIZE TAB ===== */
.optimize-view { flex:1; overflow:auto; padding:1rem; max-width:900px; }
.opt-hero { background:linear-gradient(135deg,#1E293B,#334155); color:#fff; border-radius:10px; padding:1.25rem; margin-bottom:1rem; }
.opt-hero h3 { font-size:1rem; font-weight:700; margin-bottom:.35rem; }
.opt-hero p { font-size:.75rem; color:#94A3B8; margin-bottom:.75rem; line-height:1.5; }
.opt-hero .opt-stats { display:flex; gap:1rem; flex-wrap:wrap; }
.opt-hero .opt-stat { background:rgba(255,255,255,.08); border-radius:6px; padding:.5rem .75rem; text-align:center; min-width:100px; }
.opt-hero .opt-stat .num { font-size:1.1rem; font-weight:700; }
.opt-hero .opt-stat .lbl { font-size:.6rem; color:#94A3B8; text-transform:uppercase; letter-spacing:.5px; margin-top:.15rem; }
.opt-actions { display:flex; gap:.5rem; margin-bottom:1rem; flex-wrap:wrap; }
.change-section { margin-bottom:1.25rem; }
.change-section h4 { font-size:.82rem; font-weight:600; color:var(--text-secondary); margin-bottom:.5rem; display:flex; align-items:center; gap:.4rem; }
.change-section h4 .cs-count { background:var(--primary); color:#fff; font-size:.6rem; padding:.1rem .4rem; border-radius:8px; }
.change-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:.65rem .75rem; margin-bottom:.4rem; transition:border-color .15s; }
.change-card:hover { border-color:var(--primary); }
.change-card.accepted { border-color:var(--success); background:#F0FDF4; }
.change-card.rejected { border-color:var(--border); opacity:.4; }
.change-card .cc-top { display:flex; align-items:center; gap:.5rem; margin-bottom:.35rem; }
.change-card .cc-icon { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.7rem; flex-shrink:0; }
.change-card .cc-icon.fix { background:#FEE2E2; }
.change-card .cc-icon.bundle { background:#DBEAFE; }
.change-card .cc-icon.teacher { background:#F3E8FF; }
.change-card .cc-icon.move { background:#FEF3C7; }
.change-card .cc-title { font-size:.78rem; font-weight:600; flex:1; }
.change-card .cc-actions { display:flex; gap:.3rem; }
.change-card .cc-reason { font-size:.68rem; color:var(--text-muted); margin-bottom:.35rem; }
.change-card .cc-diff { display:flex; gap:.5rem; align-items:center; font-size:.7rem; }
.change-card .cc-before { background:#FEE2E2; padding:.25rem .5rem; border-radius:4px; flex:1; }
.change-card .cc-arrow { color:var(--text-muted); font-weight:700; flex-shrink:0; }
.change-card .cc-after { background:#D1FAE5; padding:.25rem .5rem; border-radius:4px; flex:1; }
.opt-empty { text-align:center; padding:3rem; color:var(--text-muted); }
.opt-empty .opt-check { font-size:2.5rem; margin-bottom:.5rem; }

/* ===== TOAST ===== */
.toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); background:#1E293B; color:#fff; padding:.5rem 1rem; border-radius:6px; font-size:.78rem; z-index:200; display:none; box-shadow:0 4px 12px rgba(0,0,0,.2); }
.toast.show { display:block; animation:fadeInUp .3s; }
@keyframes fadeInUp { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* ===== PRINT STYLES ===== */
@media print {
  .sidebar, .topbar, .toast, .modal-overlay { display:none !important; }
  body { display:block; height:auto; overflow:visible; }
  .main { display:block; }
  .content { display:block; overflow:visible; }
  .tab-content { display:none !important; }
  #tab-schedule { display:block !important; overflow:visible !important; }
  .calendar-wrap { overflow:visible; padding:0; }
  .cal-grid { min-width:auto; }
  .cal-cell { height:24px !important; }
  .class-block { font-size:.55rem !important; }
  @page { size:landscape; margin:0.5in; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand">
    <h1>Encore Admin</h1>
    <span>Schedule Builder 2026-2027</span>
  </div>
  <nav id="nav">
    <div class="nav-item active" data-tab="schedule"><span>&#128197;</span> Schedule</div>
    <div class="nav-item" data-tab="classes"><span>&#128218;</span> Classes <span class="count" id="nav-class-count">113</span></div>
    <div class="nav-item" data-tab="teachers"><span>&#128105;&#8205;&#127891;</span> Teachers <span class="count">14</span></div>
    <div class="nav-item" data-tab="availability"><span>&#128338;</span> Availability</div>
    <div class="nav-item" data-tab="conflicts"><span>&#9888;&#65039;</span> Conflicts <span class="badge" id="nav-conflict-count">0</span></div>
    <div class="nav-item" data-tab="optimize"><span>&#10024;</span> AI Optimize <span class="badge" id="nav-opt-count" style="background:#3B82F6;">0</span></div>
    <div class="nav-item" data-tab="export"><span>&#128228;</span> Export</div>
    <div class="nav-item" data-tab="unassigned"><span>&#128203;</span> Unassigned <span class="badge" id="nav-unassigned-count" style="background:var(--danger);">0</span></div>
  </nav>

  <div class="sidebar-footer" id="sidebar-footer">
    Auto-saved just now<br>
    6 rooms &middot; Mon-Sat
  </div>
</aside>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar" id="topbar">
  <h2 id="topbar-title">Weekly Schedule</h2>
  <select id="filter-teacher"><option value="">All Teachers</option></select>
  <select id="filter-room"><option value="">All Rooms (6)</option></select>
  <button class="btn btn-outline" onclick="undo()" title="Ctrl+Z">&#8617; Undo</button>
  <button class="btn btn-outline" onclick="redo()" title="Ctrl+Y">&#8618; Redo</button>
  <button class="btn btn-primary" onclick="showAssignModal()">+ Assign Class</button>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- SCHEDULE TAB -->
  <div id="tab-schedule" class="tab-content" style="display:flex;flex:1;overflow:hidden;">
    <div class="calendar-wrap" id="calendar-wrap"></div>
  </div>

  <!-- CLASSES TAB -->
  <div id="tab-classes" class="tab-content" style="display:none;flex:1;overflow:hidden;">
    <div class="classes-view" id="classes-view"></div>
  </div>

  <!-- TEACHERS TAB -->
  <div id="tab-teachers" class="tab-content" style="display:none;flex:1;overflow:hidden;">
    <div class="teachers-view" id="teachers-view"></div>
  </div>

  <!-- AVAILABILITY TAB -->
  <div id="tab-availability" class="tab-content" style="display:none;flex:1;overflow:hidden;">
    <div class="avail-view" id="avail-view"></div>
  </div>

  <!-- CONFLICTS TAB -->
  <div id="tab-conflicts" class="tab-content" style="display:none;flex:1;overflow:hidden;">
    <div class="classes-view" id="conflicts-view"></div>
  </div>

  <!-- AI OPTIMIZE TAB -->
  <div id="tab-optimize" class="tab-content" style="display:none;flex:1;overflow:hidden;">
    <div class="optimize-view" id="optimize-view"></div>
  </div>

  <!-- EXPORT TAB -->
  <div id="tab-export" class="tab-content" style="display:none;flex:1;overflow:hidden;">
    <div class="classes-view" id="export-view" style="max-width:600px;"></div>
  </div>

  <!-- UNASSIGNED TAB -->
  <div id="tab-unassigned" class="tab-content" style="display:none;flex:1;overflow:hidden;">
    <div class="classes-view" id="unassigned-view"></div>
  </div>

</div>
</div>

<!-- ASSIGN MODAL -->
<div class="modal-overlay" id="assign-modal">
  <div class="modal">
    <h3 id="assign-modal-title">Assign Class</h3>
    <label>Class</label>
    <select id="assign-class"></select>
    <label>Teacher</label>
    <select id="assign-teacher"></select>
    <label>Day</label>
    <select id="assign-day">
      <option value="0">Monday</option><option value="1">Tuesday</option><option value="2">Wednesday</option>
      <option value="3">Thursday</option><option value="4">Friday</option><option value="5">Saturday</option>
    </select>
    <label>Start Time</label>
    <select id="assign-time"></select>
    <label>Room</label>
    <select id="assign-room"></select>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="assign-modal-btn" onclick="doAssign()">Assign</button>
    </div>
  </div>
</div>

<!-- EDIT/ADD TEACHER MODAL -->
<div class="modal-overlay" id="edit-teacher-modal">
  <div class="modal">
    <h3 id="edit-teacher-title">Edit Teacher</h3>
    <label>Full Name</label>
    <input type="text" id="edit-teacher-name">
    <label>Short Name</label>
    <input type="text" id="edit-teacher-short">
    <label>Color</label>
    <input type="color" id="edit-teacher-color">
    <label>Styles</label>
    <div class="checkbox-group" id="edit-teacher-styles"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeTeacherModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTeacher()">Save</button>
    </div>
  </div>
</div>

<!-- ADD CLASS MODAL -->
<div class="modal-overlay" id="add-class-modal">
  <div class="modal">
    <h3>Add Class</h3>
    <label>Class Name</label>
    <input type="text" id="add-class-name" placeholder="e.g. Junior Level 2 Jazz">
    <label>Style</label>
    <select id="add-class-style"></select>
    <label>Duration (minutes)</label>
    <select id="add-class-duration">
      <option value="30">30</option>
      <option value="45">45</option>

// Determine style from class name
function detectStyle(name){
  const n = name.toLowerCase();

  if(n.includes('ballet')) return 'ballet';
  if(n.includes('tap')) return 'tap';
  if(n.includes('jazz')) return 'jazz';
  return 'combo';
}

// Determine duration from class name
function detectDuration(name){
  if(name.includes('90 min')) return 90;
  const n = name.toLowerCase();
  if(n.includes('team rehearsal')) return 30;
  if(n.includes('munchkin') || (n.includes('mini') && (n.includes('combo') || n.includes('hip hop')))) return 45;
  if(n.includes('pointe after')) return 90;
  if((n.includes('etap') && (n.includes('jazz - 90') || n.includes('ballet - 90')))) return 90;
  if(n.includes('etap') && n.includes('ballet') && !n.includes('60')) return 90;
  if(n.includes('junior') && n.includes('jazz/tap')) return 90;
  return 60;
}

// Pre-fill availability (will be rebuilt from schedule after seed)
function buildAvailabilityFromSchedule(){
  TEACHERS.forEach(t => {
    state.availability[t.id] = {};
    for(let d=0; d<6; d++) state.availability[t.id][d] = [];
  });
  // For each scheduled class, mark teacher available during that window (with 30min buffer)
  state.schedule.forEach(s => {
    const cls = CLASSES.find(c=>c.id===s.classId);
    if(!cls) return;
    const BUFFER = 30;
    const dayStart = s.day === 5 ? SAT_START : WEEKDAY_START;
    const dayEnd = s.day === 5 ? SAT_END : WEEKDAY_END;
    const start = Math.max(dayStart, s.startTime - BUFFER);
    const end = Math.min(dayEnd, s.startTime + cls.duration + BUFFER);
    if(!state.availability[s.teacherId]) state.availability[s.teacherId] = {};
    if(!state.availability[s.teacherId][s.day]) state.availability[s.teacherId][s.day] = [];
    state.availability[s.teacherId][s.day].push({ start, end });
    mergeAvailSlots(s.teacherId, s.day);
  });
}

// Undo/redo
let undoStack = [];
let redoStack = [];
function pushUndo(){
  undoStack.push(JSON.parse(JSON.stringify(state.schedule)));
  redoStack = [];
  if(undoStack.length > 50) undoStack.shift();
}
function undo(){
  if(!undoStack.length) return;
  redoStack.push(JSON.parse(JSON.stringify(state.schedule)));
  state.schedule = undoStack.pop();
  saveAndRender();
  toast('Undo');
}
function redo(){
  if(!redoStack.length) return;
  undoStack.push(JSON.parse(JSON.stringify(state.schedule)));
  state.schedule = redoStack.pop();
  saveAndRender();
  toast('Redo');
}

    if(d) {
      const parsed = JSON.parse(d);
      // If data is from an older version, discard to re-seed with new class structure
      if((parsed.version||1) < SCHEDULE_VERSION){ localStorage.removeItem('encore-schedule-v1'); return; }
      state.schedule = parsed.schedule || [];
      if(parsed.ignoredConflicts) state.ignoredConflicts = parsed.ignoredConflicts;
      // Migrate old integer room IDs to string IDs
      state.schedule.forEach(s => {
        if(typeof s.room === 'number') s.room = ROOM_MAP_OLD[s.room] || 'fosse';
      });
      // Restore custom teachers
      if(parsed.customTeachers){
        state.customTeachers = parsed.customTeachers;
        parsed.customTeachers.forEach(t => {
          if(!TEACHERS.find(x=>x.id===t.id)) TEACHERS.push(t);
        });
        TEACHERS.sort((a,b) => a.name.localeCompare(b.name));
      }
      // Restore custom classes
      if(parsed.customClasses){
        state.customClasses = parsed.customClasses;
        parsed.customClasses.forEach(c => {
          if(!CLASSES.find(x=>x.id===c.id)){ CLASSES.push(c); nextClassId = Math.max(nextClassId, c.id+1); }
        });
      }
      // Migrate old availability slots: strip type field (teaching now derived from schedule)
      if(parsed.availability){
        for(const tid of Object.keys(parsed.availability)){
          for(const day of Object.keys(parsed.availability[tid])){
            parsed.availability[tid][day].forEach(s => { delete s.type; });
          }
        }
        state.availability = parsed.availability;
      }
    }
  } catch(e){}
}
function saveAndRender(){ save(); renderAll(); }

// =============================================
// UTILITIES
// =============================================
function minutesToTime(m){
  const h = Math.floor(m/60), mm = m%60;
  const ampm = h>=12?'PM':'AM';
  const hh = h>12?h-12:(h===0?12:h);
  return hh + ':' + String(mm).padStart(2,'0') + ' ' + ampm;
}

function minutesToTimeShort(m){
  const h = Math.floor(m/60), mm = m%60;
  const ampm = h>=12?'PM':'AM';
  const hh = h>12?h-12:(h===0?12:h);
  if(mm===0) return hh + ampm;
  return hh + ':' + String(mm).padStart(2,'0') + ampm;
}

function getUnassigned(){
  const assignedIds = new Set(state.schedule.map(s=>s.classId));
  return CLASSES.filter(c=>!assignedIds.has(c.id));
}

function isConflictIgnored(classIdA, classIdB){
  return state.ignoredConflicts.some(ic =>
    (ic.a === classIdA && ic.b === classIdB) || (ic.a === classIdB && ic.b === classIdA)
  );
}

function getAgeGroup(name){
  const n = name.toLowerCase();
  if(n.includes('etap')) return 'ETAP';
  if(n.includes('itp')) return 'ITP';
  if(n.includes('tween') && n.includes('teen')) return 'Tween/Teen';
  if(n.includes('teen')) return 'Teen';
  if(n.includes('tween')) return 'Tween';
  if(n.includes('junior')) return 'Junior';
  if(n.includes('mini')) return 'Mini';
  if(n.includes('munchkin')) return 'Munchkin';
  return null;
}

function getConflicts(){
  const conflicts = [];
  for(let i=0; i<state.schedule.length; i++){
    const a = state.schedule[i];
    const ac = CLASSES.find(c=>c.id===a.classId);
    if(!ac) continue;
    const aEnd = a.startTime + ac.duration;
    for(let j=i+1; j<state.schedule.length; j++){
      const b = state.schedule[j];
      const bc = CLASSES.find(c=>c.id===b.classId);
      if(!bc) continue;
      if(a.day !== b.day) continue;
      const bEnd = b.startTime + bc.duration;
      const overlap = a.startTime < bEnd && b.startTime < aEnd;
      if(!overlap) continue;
      const ignored = isConflictIgnored(a.classId, b.classId);
      // Same teacher
      if(a.teacherId === b.teacherId){
        conflicts.push({ type:'teacher', a:i, b:j, msg:teacherShort(a.teacherId) + ' double-booked', ignored });
      }
      // Same room (skip if either room is unassigned)
      if(a.room && b.room && a.room === b.room){
        conflicts.push({ type:'room', a:i, b:j, msg:roomName(a.room) + ' overlap', ignored });
      }
      // Same level in same age group (Raynor's rule)
      if(ac.level !== null && bc.level !== null && ac.level === bc.level && ac.level >= 1){
        const aGroup = getAgeGroup(ac.name);
        const bGroup = getAgeGroup(bc.name);
        if(aGroup && bGroup && aGroup === bGroup){
          conflicts.push({ type:'level', a:i, b:j, msg:'Same level (' + aGroup + ' L' + ac.level + ') at same time', ignored });
        }
      }
    }
  }
  return conflicts;
}

function isConflict(schedIdx){
  return getConflicts().some(c=>(c.a===schedIdx||c.b===schedIdx) && !c.ignored);
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2000);
}

// =============================================
// TIME GRID CONFIG
// =============================================
const SLOT_MINUTES = 15;
const AVAIL_SLOT_MINUTES = 30;
const WEEKDAY_START = 960;
const WEEKDAY_END = 1290;
const SAT_START = 540;
const SAT_END = 840;
const SLOT_HEIGHT = 28;

function getTimeSlots(){
  const allStarts = new Set();
  for(let t=SAT_START; t<SAT_END; t+=SLOT_MINUTES) allStarts.add(t);
  for(let t=WEEKDAY_START; t<WEEKDAY_END; t+=SLOT_MINUTES) allStarts.add(t);
  return [...allStarts].sort((a,b)=>a-b);
}

function getAvailTimeSlots(){
  const allStarts = new Set();
  for(let t=SAT_START; t<SAT_END; t+=AVAIL_SLOT_MINUTES) allStarts.add(t);
  for(let t=WEEKDAY_START; t<WEEKDAY_END; t+=AVAIL_SLOT_MINUTES) allStarts.add(t);
  return [...allStarts].sort((a,b)=>a-b);
}

const TIME_SLOTS = getTimeSlots();
const AVAIL_TIME_SLOTS = getAvailTimeSlots();

function isTimeInDay(time, dayIdx){
  if(dayIdx === 5) return time >= SAT_START && time < SAT_END;
  return time >= WEEKDAY_START && time < WEEKDAY_END;
}

// =============================================
// RENDER: SCHEDULE CALENDAR
// =============================================
let focusDay = -1; // -1 = show all days equally, 0-5 = expanded day
let satCollapsed = true; // Saturday starts collapsed

function renderCalendar(){
  const wrap = document.getElementById('calendar-wrap');
  const filterTeacher = document.getElementById('filter-teacher').value;
  const filterRoom = document.getElementById('filter-room').value;

  // Determine which days to show (5 if Saturday collapsed, 6 if expanded)
  const showSat = !satCollapsed || focusDay === 5;
  const numDays = showSat ? 6 : 5;

  // Filter time slots: skip Saturday-only morning hours when Saturday is collapsed
  const visibleSlots = satCollapsed && focusDay !== 5
    ? TIME_SLOTS.filter(t => t >= WEEKDAY_START)
    : TIME_SLOTS;

  // Build grid columns based on focus day
  let colTemplate;
  if(focusDay >= 0){
    const cols = [];
    for(let d=0; d<numDays; d++){
      cols.push(d === focusDay ? '4fr' : '0.5fr');
    }
    colTemplate = '56px ' + cols.join(' ');
  } else {
    colTemplate = '56px repeat(' + numDays + ',1fr)';
  }

  // Saturday toggle column when collapsed
  if(satCollapsed && focusDay !== 5){
    colTemplate += ' 28px';
  }

  let html = '<div class="cal-grid" style="grid-template-columns:' + colTemplate + ';">';
  html += '<div class="cal-header"></div>';
  const dayCount = showSat ? 6 : 5;
  for(let idx=0; idx<dayCount; idx++){
    const isExpanded = focusDay === idx;
    const expandedStyle = isExpanded ? 'background:#DBEAFE;color:var(--primary);' : '';
    const arrow = isExpanded ? ' &#9664;' : ' &#9654;';
    let dayLabel;
    if(isExpanded) dayLabel = DAYS[idx];
    else if(focusDay >= 0) dayLabel = DAY_SHORT[idx].charAt(0);
    else dayLabel = DAY_SHORT[idx];
    html += '<div class="cal-header" style="cursor:pointer;user-select:none;' + expandedStyle + '" data-day-header="' + idx + '">' + dayLabel + '<span style="font-size:.5rem;margin-left:2px;opacity:.5;">' + arrow + '</span></div>';
  }
  // Saturday toggle header when collapsed
  if(satCollapsed && focusDay !== 5){
    html += '<div class="cal-header" style="cursor:pointer;writing-mode:vertical-lr;padding:.3rem .1rem;font-size:.55rem;line-height:1;letter-spacing:1px;user-select:none;" data-sat-toggle="1" title="Show Saturday">+ Sat</div>';
  }

  const gridCols = dayCount + (satCollapsed && focusDay !== 5 ? 1 : 0);

  visibleSlots.forEach(time => {
    const isHour = time % 60 === 0;
    html += '<div class="cal-time' + (isHour?' hour-mark':'') + '">' + (isHour?minutesToTime(time):'') + '</div>';
    for(let d=0; d<dayCount; d++){
      const valid = isTimeInDay(time, d);
      html += '<div class="cal-cell' + (valid?'':' unavailable') + '" data-day="' + d + '" data-time="' + time + '"></div>';
    }
    // Empty cell for Saturday toggle column
    if(satCollapsed && focusDay !== 5){
      html += '<div style="height:28px;background:#F5F5F5;border-bottom:1px solid var(--border-light);"></div>';
    }
  });
  html += '</div>';
  wrap.innerHTML = html;

  const grid = wrap.querySelector('.cal-grid');

  state.schedule.forEach((sched, idx) => {
    if(filterTeacher && sched.teacherId !== filterTeacher) return;
    if(filterRoom && sched.room !== filterRoom) return;

    const cls = CLASSES.find(c=>c.id===sched.classId);
    if(!cls) return;

    const dayCol = sched.day;

    const dayCount = showSat ? 6 : 5;
    const totalGridCols = 1 + dayCount + (satCollapsed && focusDay !== 5 ? 1 : 0);
    if(dayCol >= dayCount) return; // Saturday collapsed, skip
    const timeRowInVisible = visibleSlots.indexOf(sched.startTime);
    if(timeRowInVisible < 0) return;
    const cellIdx = totalGridCols + timeRowInVisible * totalGridCols + 1 + dayCol;
    const cell = grid.children[cellIdx];
    if(!cell) return;

    const slots = cls.duration / SLOT_MINUTES;
    const height = slots * SLOT_HEIGHT - 2;
    const style = cls.style;
    const hasConflict = isConflict(idx);

    const overlapping = state.schedule.filter((s2, i2) => {
      if(i2 === idx) return false;
      if(s2.day !== sched.day) return false;
      if(filterTeacher && s2.teacherId !== filterTeacher) return false;
      if(filterRoom && s2.room !== filterRoom) return false;
      const c2 = CLASSES.find(c=>c.id===s2.classId);
      if(!c2) return false;
      return s2.startTime < sched.startTime + cls.duration && sched.startTime < s2.startTime + c2.duration;
    });

    let colClass = '';
    if(overlapping.length === 1){
      const otherIdx = state.schedule.indexOf(overlapping[0]);
      if(idx < otherIdx) colClass = ' col-left';
      else colClass = ' col-right';
    } else if(overlapping.length >= 2){
      const allOverlap = [sched, ...overlapping].sort((a,b)=>state.schedule.indexOf(a)-state.schedule.indexOf(b));
      const myPos = allOverlap.indexOf(sched);
      if(myPos === 0) colClass = ' col-third-1';
      else if(myPos === 1) colClass = ' col-third-2';
      else colClass = ' col-third-3';
    }

    const teacher = teacherById(sched.teacherId);
    const isCollapsedDay = focusDay >= 0 && sched.day !== focusDay;
    const block = document.createElement('div');
    block.className = 'class-block style-' + style + (hasConflict?' conflict':'') + colClass;
    block.style.top = '0px';
    block.style.height = height + 'px';
    block.draggable = true;
    block.dataset.schedIdx = idx;
    if(isCollapsedDay){
      block.innerHTML = '';
      block.style.padding = '0';
      block.style.fontSize = '0';
    } else {
      block.innerHTML = '<div class="cb-name">' + cls.name + '</div><div class="cb-teacher">' + (teacher?teacher.short:'?') + '</div><div class="cb-room">' + roomName(sched.room) + ' &middot; ' + cls.duration + 'm</div>';
    }
    block.title = cls.name + '\n' + (teacher?teacher.name:'?') + '\n' + DAYS[sched.day] + ' ' + minutesToTime(sched.startTime) + '-' + minutesToTime(sched.startTime+cls.duration) + '\n' + roomName(sched.room);

    block.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', String(idx));
      block.classList.add('dragging');
    });
    block.addEventListener('dragend', () => block.classList.remove('dragging'));

    block.addEventListener('contextmenu', e => {
      e.preventDefault();
      if(confirm('Remove "' + cls.name + '" from schedule?')){
        pushUndo();
        state.schedule.splice(idx, 1);
        saveAndRender();
        toast('Class removed');
      }
    });

    // Click to edit assignment
    block.addEventListener('click', e => {
      if(e.defaultPrevented) return;
      showEditAssignment(idx);
    });

    cell.appendChild(block);
  });

  // Drop targets
  grid.querySelectorAll('.cal-cell:not(.unavailable)').forEach(cell => {
    cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drop-target'); });
    cell.addEventListener('dragleave', () => cell.classList.remove('drop-target'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drop-target');
      const data = e.dataTransfer.getData('text/plain');
      const day = parseInt(cell.dataset.day);
      const time = parseInt(cell.dataset.time);

      if(data && !isNaN(parseInt(data)) && !data.startsWith('class-')){
        const schedIdx = parseInt(data);
        if(schedIdx < state.schedule.length){
          pushUndo();
          state.schedule[schedIdx].day = day;
          state.schedule[schedIdx].startTime = time;
          saveAndRender();
          toast('Class moved');
        }
      } else if(data.startsWith('class-')){
        const classId = parseInt(data.replace('class-',''));
        showAssignModal(classId, day, time);
      }
    });

    cell.addEventListener('dblclick', () => {
      const day = parseInt(cell.dataset.day);
      const time = parseInt(cell.dataset.time);
      showAssignModal(null, day, time);
    });
  });

  const conflicts = getConflicts().filter(c => !c.ignored);
  document.getElementById('nav-conflict-count').textContent = conflicts.length;

  // Day header click to expand/collapse
  grid.querySelectorAll('[data-day-header]').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const d = parseInt(hdr.dataset.dayHeader);
      if(d === 5){
        // Saturday: toggle between expanded-focus and collapsed
        if(focusDay === 5){
          focusDay = -1;
          satCollapsed = true; // collapse Saturday back
        } else {
          satCollapsed = false;
          focusDay = 5;
        }
      } else {
        focusDay = (focusDay === d) ? -1 : d;
      }
      renderCalendar();
    });
  });

  // Saturday toggle (collapsed column)
  grid.querySelectorAll('[data-sat-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      satCollapsed = false;
      renderCalendar();
    });
  });
}

  ).join('');

function editTeacher(id){
  editingTeacherId = id;
  document.getElementById('edit-teacher-title').textContent = 'Edit Teacher';
  const t = teacherById(id);
  if(!t) return;
  document.getElementById('edit-teacher-name').value = t.name;
  document.getElementById('edit-teacher-short').value = t.short;
  document.getElementById('edit-teacher-color').value = t.color;
  const stylesDiv = document.getElementById('edit-teacher-styles');
  stylesDiv.innerHTML = Object.entries(STYLES).map(([key, label]) =>
    '<label><input type="checkbox" value="' + key + '"' + (t.styles.includes(key)?' checked':'') + '> ' + label + '</label>'
  ).join('');
  document.getElementById('edit-teacher-modal').classList.add('show');
}
function closeTeacherModal(){
  document.getElementById('edit-teacher-modal').classList.remove('show');
  editingTeacherId = null;
}
function saveTeacher(){
  if(!editingTeacherId) return;
  const name = document.getElementById('edit-teacher-name').value.trim();
  const short = document.getElementById('edit-teacher-short').value.trim();
  const color = document.getElementById('edit-teacher-color').value;
  const styles = [...document.querySelectorAll('#edit-teacher-styles input:checked')].map(cb=>cb.value);
  if(!name){ toast('Name is required'); return; }
  if(editingTeacherId === '__new__'){
    const id = name.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,12) + '_' + Date.now().toString(36);
    const newT = { id, name, short: short || name.split(' ')[0], color, styles };
    TEACHERS.push(newT);
    TEACHERS.sort((a,b) => a.name.localeCompare(b.name));
    if(!state.customTeachers) state.customTeachers = [];
    state.customTeachers.push(newT);
    closeTeacherModal();
    populateFilters();
    renderAll();
    save();
    toast('Teacher added');
  } else {
    const t = teacherById(editingTeacherId);
    if(!t) return;
    t.name = name;
    t.short = short || t.short;
    t.color = color;
    t.styles = styles;
    closeTeacherModal();
    populateFilters();
    renderAll();
    save();
    toast('Teacher updated');
  }
}

  classesToShow.forEach((c,i) => {

let availPaintValue = true;

  } else {
    html += '<div class="avail-header sat-toggle" onclick="satExpanded=true;renderAvailability()" title="Expand Saturday" style="writing-mode:vertical-lr;padding:.3rem .1rem;font-size:.55rem;line-height:1;letter-spacing:1px;">+ Sat</div>';
  }

  // Filter time slots: skip morning rows when Saturday is collapsed (weekdays start at 4PM)
  const visibleAvailSlots = satExpanded ? AVAIL_TIME_SLOTS : AVAIL_TIME_SLOTS.filter(t => t >= WEEKDAY_START);

  visibleAvailSlots.forEach(time => {
    const isHour = time % 60 === 0;
    html += '<div class="cal-time' + (isHour?' hour-mark':'') + '" style="height:20px;font-size:.58rem;">' + (isHour?minutesToTime(time):'') + '</div>';

      if(!valid){
        html += '<div class="avail-cell" style="background:#F5F5F5;cursor:default;" data-day="' + d + '" data-time="' + time + '"></div>';
        continue;
      }
      const avail = isAvailableRange(availTeacher, d, time, AVAIL_SLOT_MINUTES);
      const hasClass = state.schedule.some(s => s.teacherId === availTeacher && s.day === d && s.startTime <= time && s.startTime + (CLASSES.find(c=>c.id===s.classId)?.duration||60) > time);
      let cls = 'avail-cell';
      if(avail) cls += ' available';
      if(hasClass) cls += ' teaching';
      html += '<div class="' + cls + '" data-day="' + d + '" data-time="' + time + '"></div>';
    }
    // Saturday column
    if(satExpanded){
      const valid = isTimeInDay(time, 5);
      if(!valid){
        html += '<div class="avail-cell" style="background:#F5F5F5;cursor:default;" data-day="5" data-time="' + time + '"></div>';
      } else {
        const avail = isAvailableRange(availTeacher, 5, time, AVAIL_SLOT_MINUTES);
        const hasClass = state.schedule.some(s => s.teacherId === availTeacher && s.day === 5 && s.startTime <= time && s.startTime + (CLASSES.find(c=>c.id===s.classId)?.duration||60) > time);
        let cls = 'avail-cell';
        if(avail) cls += ' available';
        if(hasClass) cls += ' teaching';
        html += '<div class="' + cls + '" data-day="5" data-time="' + time + '"></div>';

    const cell = e.target.closest('.avail-cell');

    e.preventDefault();
    availPainting = true;
    const d = parseInt(cell.dataset.day);

    if(e.button === 2){
      // Right-click always clears
      availPaintValue = false;
      removeAvailabilityBlock(availTeacher, d, t, AVAIL_SLOT_MINUTES);
    } else {
      // Left-click toggles available on/off (teaching is read-only from schedule)
      const isAvail = isAvailableSlot(availTeacher, d, t, AVAIL_SLOT_MINUTES);

    const cell = e.target.closest('.avail-cell');

    else removeAvailabilityBlock(availTeacher, d, t, AVAIL_SLOT_MINUTES);
    renderAvailability();
  });
  grid.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('mouseup', () => { if(availPainting){ availPainting=false; save(); } });
}

function getAvailSummary(teacherId){
  // Row 1: full availability window (from availability data)
  // Row 2: teaching times (derived from state.schedule)
  const windowPills = [];
  const teachPills = [];
  for(let d=0; d<6; d++){
    // Available: from availability data
    const slots = state.availability[teacherId]?.[d];
    if(slots && slots.length > 0){
      const ranges = mergeForDisplay(slots).map(s => minutesToTimeShort(s.start) + '-' + minutesToTimeShort(s.end)).join(', ');
      windowPills.push('<span class="avail-day-pill type-available"><strong>' + DAY_SHORT[d] + '</strong> <span>' + ranges + '</span></span>');
    }
    // Teaching: from schedule
    const dayClasses = state.schedule.filter(s => s.teacherId === teacherId && s.day === d);
    if(dayClasses.length){
      const teachRanges = dayClasses.map(s => {
        const cls = CLASSES.find(c=>c.id===s.classId);
        return { start:s.startTime, end:s.startTime + (cls?.duration||60) };
      });
      const ranges = mergeForDisplay(teachRanges).map(s => minutesToTimeShort(s.start) + '-' + minutesToTimeShort(s.end)).join(', ');
      teachPills.push('<span class="avail-day-pill type-teaching"><strong>' + DAY_SHORT[d] + '</strong> <span>' + ranges + '</span></span>');
    }
  }
  if(!windowPills.length && !teachPills.length) return '<span style="color:var(--text-muted);font-style:italic;">No availability set &mdash; click the grid below to paint available hours</span>';
  let html = '';
  html += '<div class="avail-summary-row"><span class="avail-summary-label" style="color:#15803D;">&#9679; Available</span>' + (windowPills.length ? windowPills.join('') : '<span style="color:var(--text-muted);font-size:.7rem;">None</span>') + '</div>';
  html += '<div class="avail-summary-row"><span class="avail-summary-label" style="color:#2563EB;">&#9679; Teaching</span>' + (teachPills.length ? teachPills.join('') : '<span style="color:var(--text-muted);font-size:.7rem;">None</span>') + '</div>';
  return html;
}

function mergeForDisplay(slots){
  if(!slots.length) return [];
  const sorted = [...slots].sort((a,b)=>a.start-b.start);
  const merged = [{start:sorted[0].start, end:sorted[0].end}];
  for(let i=1; i<sorted.length; i++){
    const last = merged[merged.length-1];
    if(sorted[i].start <= last.end) last.end = Math.max(last.end, sorted[i].end);
    else merged.push({start:sorted[i].start, end:sorted[i].end});
  }
  return merged;
}

function getCellType(teacherId, day, time, duration){
  // Teaching: derived from actual schedule (source of truth)
  const hasClass = state.schedule.some(s => {
    if(s.teacherId !== teacherId || s.day !== day) return false;
    const cls = CLASSES.find(c=>c.id===s.classId);
    const classEnd = s.startTime + (cls?.duration||60);
    return time < classEnd && (time + duration) > s.startTime;
  });
  if(hasClass) return 'teaching';
  // Available: from painted availability data
  const slots = state.availability[teacherId]?.[day];
  if(slots && slots.some(s => time < s.end && (time + duration) > s.start)) return 'available';
  return 'none';
}

function isAvailableSlot(teacherId, day, time, duration){
  const slots = state.availability[teacherId]?.[day];
  if(!slots) return false;
  return slots.some(s => time < s.end && (time + duration) > s.start);
}

function isAvailableRange(teacherId, day, time, duration){
  const slots = state.availability[teacherId]?.[day];
  if(!slots) return false;
  return slots.some(s => time >= s.start && (time + duration) <= s.end);
}

function isAvailable(teacherId, day, time){
  const slots = state.availability[teacherId]?.[day];
  if(!slots) return false;
  return slots.some(s => time >= s.start && time < s.end);
}

function setAvailabilityBlock(teacherId, day, time, duration){
  removeAvailabilityBlock(teacherId, day, time, duration);
  if(!state.availability[teacherId]) state.availability[teacherId] = {};
  if(!state.availability[teacherId][day]) state.availability[teacherId][day] = [];
  state.availability[teacherId][day].push({ start:time, end:time+duration });
  mergeAvailSlots(teacherId, day);
}

function addAvailabilityBlock(teacherId, day, time, duration){
  if(!state.availability[teacherId]) state.availability[teacherId] = {};
  if(!state.availability[teacherId][day]) state.availability[teacherId][day] = [];
  for(let t=time; t<time+duration; t+=15){
    if(!isAvailable(teacherId, day, t)){
      state.availability[teacherId][day].push({ start:t, end:t+15 });
    }
  }
  mergeAvailSlots(teacherId, day);
}

function removeAvailabilityBlock(teacherId, day, time, duration){
  if(!state.availability[teacherId]?.[day]) return;
  for(let t=time; t<time+duration; t+=15){
    state.availability[teacherId][day] = state.availability[teacherId][day].flatMap(s => {
      if(t >= s.start && t < s.end){
        const result = [];
        if(s.start < t) result.push({ start:s.start, end:t });
        if(t + 15 < s.end) result.push({ start:t+15, end:s.end });
        return result;
      }
      return [s];
    });
  }
}

function mergeAvailSlots(teacherId, day){
  const slots = state.availability[teacherId][day];
  if(!slots || slots.length < 2) return;
  slots.sort((a,b)=>a.start-b.start);
  const merged = [slots[0]];
  for(let i=1; i<slots.length; i++){
    const last = merged[merged.length-1];
    if(slots[i].start <= last.end){
      last.end = Math.max(last.end, slots[i].end);
    } else {
      merged.push(slots[i]);
    }
  }
  state.availability[teacherId][day] = merged;
}

    let actions = '';
    if(c.ignored){
      actions = '<button class="btn btn-sm btn-outline" onclick="unignoreConflict(' + a.classId + ',' + b.classId + ')">Unignore</button>';
    } else {
      const shortName = cbName.length > 25 ? cbName.substring(0,22) + '...' : cbName;
      actions = '<button class="btn btn-sm btn-danger" onclick="removeScheduleItem(' + c.b + ')" title="Remove from schedule">Remove ' + shortName + '</button> ';
      actions += '<button class="btn btn-sm btn-muted" onclick="ignoreConflict(' + a.classId + ',' + b.classId + ')" title="Ignore this conflict">Ignore</button>';
    }

    return '<tr' + rowClass + '>' +
      '<td><span style="color:var(--danger);font-weight:600;">' + typeIcon + '</span></td>' +
      '<td style="font-weight:600;">' + caName + '<br><span style="font-size:.65rem;color:var(--text-muted);">' + DAYS[a.day] + ' ' + minutesToTime(a.startTime) + ' &middot; ' + teacherShort(a.teacherId) + ' &middot; ' + roomName(a.room) + '</span></td>' +
      '<td style="font-weight:600;">' + cbName + '<br><span style="font-size:.65rem;color:var(--text-muted);">' + DAYS[b.day] + ' ' + minutesToTime(b.startTime) + ' &middot; ' + teacherShort(b.teacherId) + ' &middot; ' + roomName(b.room) + '</span></td>' +
      '<td style="font-size:.72rem;">' + c.msg + '</td>' +
      '<td style="white-space:nowrap;">' + actions + '</td>' +
    '</tr>';
  }

  activeConflicts.forEach(c => { html += renderConflictRow(c); });
  if(ignoredConflicts.length){
    html += '<tr><td colspan="5" style="background:#F8FAFC;text-align:center;font-size:.72rem;color:var(--text-muted);padding:.5rem;">Ignored Conflicts</td></tr>';
    ignoredConflicts.forEach(c => { html += renderConflictRow(c); });
  }

  html += '</tbody></table>';
  view.innerHTML = html;
}

function ignoreConflict(classIdA, classIdB){
  if(!isConflictIgnored(classIdA, classIdB)){
    state.ignoredConflicts.push({ a:classIdA, b:classIdB });
    saveAndRender();
    toast('Conflict ignored');
  }
}

function unignoreConflict(classIdA, classIdB){
  state.ignoredConflicts = state.ignoredConflicts.filter(ic =>
    !((ic.a === classIdA && ic.b === classIdB) || (ic.a === classIdB && ic.b === classIdA))
  );
  saveAndRender();
  toast('Conflict unignored');
}

function removeScheduleItem(idx){
  const sched = state.schedule[idx];
  const cls = sched ? CLASSES.find(c=>c.id===sched.classId) : null;
  if(cls && !confirm('Remove "' + cls.name + '" from the schedule?')) return;
  pushUndo();
  state.schedule.splice(idx, 1);
  saveAndRender();
  toast('Removed');
}

// Extract group key for bundling (e.g. "Junior L2", "ETAP A")
function extractGroupKey(name){
  const n = name.toLowerCase();
  // ETAP letter groups
  if(n.includes('etap a ') || n.startsWith('etap a')) return 'ETAP A';
  if(n.includes('etap b') || n.includes('etap b&c')) return 'ETAP B&C';
  if(n.includes('etap d')) return 'ETAP D';
  if(n.includes('etap company')) return 'ETAP Company';
  // ITP letter groups
  if(n.includes('itp a ') || n.startsWith('itp a')) return 'ITP A';
  if(n.includes('itp b') || n.includes('itp b &')) return 'ITP B&C';
  if(n.includes('itp d')) return 'ITP D';
  if(n.includes('itp e')) return 'ITP E';
  // Age group + level
  const ag = getAgeGroup(name);
  const lv = extractLevel(name);
  if(ag && lv !== null && lv >= 1) return ag + ' L' + lv;
  if(ag) return ag;
  return null;
}

// Extract dance style for bundling
function extractBundleStyle(name){
  const n = name.toLowerCase();
  if(n.includes('acting')) return 'acting';
  if(n.includes('voice')) return 'voice';
  if(n.includes('broadway')) return 'broadway';
  if(n.includes('leaps') || n.includes('turns')) return 'leaps';
  if(n.includes('ballroom')) return 'ballroom';
  if(n.includes('hip hop')) return 'hiphop';
  if(n.includes('contemp')) return 'contemp';
  if(n.includes('ballet')) return 'ballet';
  if(n.includes('tap') && n.includes('jazz')) return 'jazz'; // combo
  if(n.includes('tap')) return 'tap';
  if(n.includes('jazz')) return 'jazz';
  if(n.includes('combo')) return 'combo';
  return null;
}

// Bundle affinity groups: styles that should be scheduled back-to-back
const BUNDLE_GROUPS = [
  { styles: ['tap','jazz'], label: 'Tap + Jazz' },
  { styles: ['ballet','contemp','hiphop'], label: 'Ballet + Contemporary (+ Hip Hop)' },
];

let optimizerProposals = {}; // strategy -> { proposed, changes }
let activeStrategy = 'recommended';
let changeStates = {}; // changeIdx -> 'accepted'|'rejected'|null

const STRATEGIES = [
  { id: 'recommended', label: '&#11088; Recommended', desc: 'Teacher rules + conflict fixes + bundling' },
  { id: 'minimal', label: '&#128296; Minimal Changes', desc: 'Only fix teacher rules and level conflicts' },
  { id: 'maxbundle', label: '&#128279; Maximum Bundling', desc: 'Aggressively bundle all style pairs' },
];

function runOptimizer(strategy){
  strategy = strategy || activeStrategy;
  const proposed = JSON.parse(JSON.stringify(state.schedule));
  const changes = [];
  let changeId = 0;

  // ===== STEP 1: Fix teacher assignments =====
  proposed.forEach((sched, idx) => {
    const cls = CLASSES.find(c=>c.id===sched.classId);
    if(!cls) return;
    const n = cls.name.toLowerCase();
    const isMiniMunchkin = n.includes('mini') || n.includes('munchkin');

    // Rule: Minis/Munchkins only Paige or Cami
    if(isMiniMunchkin && sched.teacherId !== 'paige' && sched.teacherId !== 'cami'){
      const oldTeacher = teacherShort(sched.teacherId);
      sched.teacherId = cls.eligibleTeachers.includes('paige') ? 'paige' : 'cami';
      changes.push({
        id: changeId++, type: 'teacher', category: 'Teacher Rules',
        title: cls.name,
        reason: 'Only Paige and Cami teach minis and munchkins',
        before: 'Teacher: ' + oldTeacher,
        after: 'Teacher: ' + teacherShort(sched.teacherId),
        schedIdx: idx,
      });
    }

    // Rule: Luke teaches Level 1 and up, all upper level hip hop
    if(n.includes('hip hop') && !isMiniMunchkin && cls.level !== null && cls.level >= 1){
      // For upper-level hip hop (L2+), prefer Luke
      if(cls.level >= 2 && sched.teacherId !== 'luke' && cls.eligibleTeachers.includes('luke')){
        const oldTeacher = teacherShort(sched.teacherId);
        // Check Luke isn't already teaching at this time
        const lukeConflict = proposed.some((s2, i2) => i2 !== idx && s2.teacherId === 'luke' && s2.day === sched.day && (() => {
          const c2 = CLASSES.find(c=>c.id===s2.classId);
          return c2 && s2.startTime < sched.startTime + cls.duration && sched.startTime < s2.startTime + c2.duration;
        })());
        if(!lukeConflict){
          sched.teacherId = 'luke';
          changes.push({
            id: changeId++, type: 'teacher', category: 'Teacher Rules',
            title: cls.name,
            reason: 'Luke teaches all upper level hip hop classes',
            before: 'Teacher: ' + oldTeacher,
            after: 'Teacher: Luke S.',
            schedIdx: idx,
          });
        }
      }
    }
  });

  // ===== STEP 2: Fix same-level conflicts (all strategies) =====
  function findLevelConflicts(sched){
    const conflicts = [];
    for(let i=0; i<sched.length; i++){
      const a = sched[i]; const ac = CLASSES.find(c=>c.id===a.classId); if(!ac) continue;
      for(let j=i+1; j<sched.length; j++){
        const b = sched[j]; const bc = CLASSES.find(c=>c.id===b.classId); if(!bc) continue;
        if(a.day !== b.day) continue;
        const aEnd = a.startTime + ac.duration;
        const bEnd = b.startTime + bc.duration;
        if(!(a.startTime < bEnd && b.startTime < aEnd)) continue;
        if(ac.level !== null && bc.level !== null && ac.level === bc.level && ac.level >= 1){
          const ag = getAgeGroup(ac.name), bg = getAgeGroup(bc.name);
          if(ag && bg && ag === bg) conflicts.push({i, j, level: ac.level, group: ag});
        }
      }
    }
    return conflicts;
  }

  const levelConflicts = findLevelConflicts(proposed);
  levelConflicts.forEach(lc => {
    const sched = proposed[lc.j];
    const cls = CLASSES.find(c=>c.id===sched.classId);
    if(!cls) return;
    const oldDay = DAYS[sched.day];
    const oldTime = minutesToTime(sched.startTime);

    // Try to move to a different non-conflicting time on same day first, then other days
    let moved = false;
    const tryDays = [sched.day, ...Array.from({length:6},(_,i)=>i).filter(d=>d!==sched.day)];
    for(const tryDay of tryDays){
      if(moved) break;
      const dayStart = tryDay === 5 ? SAT_START : WEEKDAY_START;
      const dayEnd = tryDay === 5 ? SAT_END : WEEKDAY_END;
      for(let t = dayStart; t <= dayEnd - cls.duration; t += SLOT_MINUTES){
        if(tryDay === sched.day && t === sched.startTime) continue;
        // Check teacher availability
        if(!isAvailable(sched.teacherId, tryDay, t)) continue;
        // Check no room conflict
        const roomConflict = proposed.some((s2, i2) => {
          if(i2 === lc.j) return false;
          if(s2.day !== tryDay || s2.room !== sched.room) return false;
          const c2 = CLASSES.find(c=>c.id===s2.classId);
          return c2 && t < s2.startTime + c2.duration && s2.startTime < t + cls.duration;
        });
        if(roomConflict) continue;
        // Check no teacher conflict
        const teacherConflict = proposed.some((s2, i2) => {
          if(i2 === lc.j) return false;
          if(s2.day !== tryDay || s2.teacherId !== sched.teacherId) return false;
          const c2 = CLASSES.find(c=>c.id===s2.classId);
          return c2 && t < s2.startTime + c2.duration && s2.startTime < t + cls.duration;
        });
        if(teacherConflict) continue;
        // Check no same-level conflict at new time
        const sameLevelConflict = proposed.some((s2, i2) => {
          if(i2 === lc.j) return false;
          if(s2.day !== tryDay) return false;
          const c2 = CLASSES.find(c=>c.id===s2.classId);
          if(!c2 || c2.level !== cls.level || c2.level < 1) return false;
          const g2 = getAgeGroup(c2.name);
          if(g2 !== getAgeGroup(cls.name)) return false;
          return t < s2.startTime + c2.duration && s2.startTime < t + cls.duration;
        });
        if(sameLevelConflict) continue;

        // Found a valid slot
        changes.push({
          id: changeId++, type: 'move', category: 'Same-Level Conflicts',
          title: cls.name,
          reason: 'No same levels at the same time (' + lc.group + ' Level ' + lc.level + ')',
          before: oldDay + ' ' + oldTime + ' -- ' + roomName(sched.room),
          after: DAYS[tryDay] + ' ' + minutesToTime(t) + ' -- ' + roomName(sched.room),
          schedIdx: lc.j,
        });
        sched.day = tryDay;
        sched.startTime = t;
        moved = true;
        break;
      }
    }
  });

  // ===== STEP 3: Bundle classes (recommended + maxbundle only) =====
  if(strategy !== 'minimal'){
  // Group scheduled classes by group key
  const activeBundleGroups = strategy === 'maxbundle' ? [
    ...BUNDLE_GROUPS,
    { styles: ['jazz','contemp'], label: 'Jazz + Contemporary' },
    { styles: ['tap','hiphop'], label: 'Tap + Hip Hop' },
    { styles: ['ballet','jazz'], label: 'Ballet + Jazz' },
  ] : BUNDLE_GROUPS;
  const grouped = {};
  proposed.forEach((sched, idx) => {
    const cls = CLASSES.find(c=>c.id===sched.classId);
    if(!cls) return;
    const key = extractGroupKey(cls.name);
    if(!key) return;
    const style = extractBundleStyle(cls.name);
    if(!style) return;
    if(!grouped[key]) grouped[key] = [];
    grouped[key].push({ idx, sched, cls, style });
  });

  // For each group, check each bundle affinity pair
  Object.entries(grouped).forEach(([groupKey, items]) => {
    activeBundleGroups.forEach(bg => {
      // Find items matching this bundle group
      const matching = items.filter(it => bg.styles.includes(it.style));
      if(matching.length < 2) return;

      // Group by day
      const byDay = {};
      matching.forEach(it => {
        if(!byDay[it.sched.day]) byDay[it.sched.day] = [];
        byDay[it.sched.day].push(it);
      });

      // Check each day for back-to-back-ness
      Object.values(byDay).forEach(dayItems => {
        if(dayItems.length < 2) return;
        // Sort by start time
        dayItems.sort((a,b) => a.sched.startTime - b.sched.startTime);
        // Check each consecutive pair
        for(let i=0; i<dayItems.length-1; i++){
          const a = dayItems[i], b = dayItems[i+1];
          const aEnd = a.sched.startTime + a.cls.duration;
          const gap = b.sched.startTime - aEnd;
          if(gap === 0) continue; // Already back-to-back
          if(gap > 0 && gap <= 15) continue; // Close enough (5-15min break is fine)

          // Not back-to-back -- try to move B right after A
          const targetTime = aEnd;
          const targetDay = a.sched.day;
          const bIdx = b.idx;

          // Can we place B at targetTime?
          const cls = b.cls;
          const sched = proposed[bIdx];
          let canPlace = true;

          // Check teacher availability
          if(!isAvailable(sched.teacherId, targetDay, targetTime)) canPlace = false;

          // Check room conflict
          if(canPlace){
            canPlace = !proposed.some((s2, i2) => {
              if(i2 === bIdx) return false;
              if(s2.day !== targetDay || s2.room !== sched.room) return false;
              const c2 = CLASSES.find(c=>c.id===s2.classId);
              return c2 && targetTime < s2.startTime + c2.duration && s2.startTime < targetTime + cls.duration;
            });
          }

          // Check teacher conflict
          if(canPlace){
            canPlace = !proposed.some((s2, i2) => {
              if(i2 === bIdx) return false;
              if(s2.day !== targetDay || s2.teacherId !== sched.teacherId) return false;
              const c2 = CLASSES.find(c=>c.id===s2.classId);
              return c2 && targetTime < s2.startTime + c2.duration && s2.startTime < targetTime + cls.duration;
            });
          }

          if(canPlace && (targetTime !== sched.startTime || targetDay !== sched.day)){
            const oldDay = DAYS[sched.day];
            const oldTime = minutesToTime(sched.startTime);
            changes.push({
              id: changeId++, type: 'bundle', category: 'Class Bundling',
              title: cls.name,
              reason: 'Bundle ' + bg.label + ' back-to-back (' + groupKey + ') -- right after ' + a.cls.name,
              before: oldDay + ' ' + oldTime,
              after: DAYS[targetDay] + ' ' + minutesToTime(targetTime),
              schedIdx: bIdx,
            });
            sched.startTime = targetTime;
            sched.day = targetDay;
          }
        }
      });

      // Also check: classes in this bundle that are on DIFFERENT days
      // Find pairs on different days -- suggest moving one to make a bundle
      const uniqueDays = Object.keys(byDay).map(Number);
      if(uniqueDays.length >= 2 && matching.length >= 2){
        // Find if any style appears alone on a day without its bundle partner
        matching.forEach(item => {
          const partners = matching.filter(m => m !== item && m.style !== item.style);
          const sameDayPartner = partners.find(p => p.sched.day === item.sched.day);
          if(sameDayPartner) return; // Already has a partner on same day

          // Find closest partner on another day
          const otherPartner = partners[0];
          if(!otherPartner) return;

          // Try to move this item right after or before the partner
          const targetDay = otherPartner.sched.day;
          const partnerEnd = otherPartner.sched.startTime + otherPartner.cls.duration;
          const targetTime = partnerEnd;
          const bIdx = item.idx;
          const cls = item.cls;
          const sched = proposed[bIdx];

          if(sched.day === targetDay) return; // Already moved

          let canPlace = true;
          if(!isAvailable(sched.teacherId, targetDay, targetTime)) canPlace = false;
          if(canPlace){
            canPlace = !proposed.some((s2, i2) => {
              if(i2 === bIdx) return false;
              if(s2.day !== targetDay || s2.room !== sched.room) return false;
              const c2 = CLASSES.find(c=>c.id===s2.classId);
              return c2 && targetTime < s2.startTime + c2.duration && s2.startTime < targetTime + cls.duration;
            });
          }
          if(canPlace){
            canPlace = !proposed.some((s2, i2) => {
              if(i2 === bIdx) return false;
              if(s2.day !== targetDay || s2.teacherId !== sched.teacherId) return false;
              const c2 = CLASSES.find(c=>c.id===s2.classId);
              return c2 && targetTime < s2.startTime + c2.duration && s2.startTime < targetTime + cls.duration;
            });
          }

          if(canPlace){
            const oldDay = DAYS[sched.day];
            const oldTime = minutesToTime(sched.startTime);
            changes.push({
              id: changeId++, type: 'bundle', category: 'Class Bundling',
              title: cls.name,
              reason: 'Move ' + item.style + ' to same day as ' + otherPartner.cls.name + ' for back-to-back bundle (' + groupKey + ')',
              before: oldDay + ' ' + oldTime,
              after: DAYS[targetDay] + ' ' + minutesToTime(targetTime),
              schedIdx: bIdx,
            });
            sched.day = targetDay;
            sched.startTime = targetTime;
          }
        });
      }
    });
  });

  } // end if strategy !== 'minimal'

  optimizerProposals[strategy] = { proposed, changes };
  if(strategy === activeStrategy) changeStates = {};
  return optimizerProposals[strategy];
}

function getStrategySummary(strategy, teacherChanges, levelChanges, bundleChanges){
  let bullets = [];
  const tc = teacherChanges.length, lc = levelChanges.length, bc = bundleChanges.length;
  if(strategy === 'recommended'){
    bullets.push('Balanced approach: applies all rules with standard bundling groups');
    if(tc) bullets.push('Fixes ' + tc + ' teacher assignment' + (tc!==1?'s':'') + ' to match studio policies (e.g. Paige/Cami for minis, Luke for upper hip hop)');
    if(lc) bullets.push('Resolves ' + lc + ' same-level conflict' + (lc!==1?'s':'') + ' -- students won\'t have to choose between classes at their level');
    if(bc) bullets.push('Bundles ' + bc + ' class' + (bc!==1?'es':'') + ' back-to-back (Tap+Jazz, Ballet+Contemporary) so families make fewer trips');
    if(!tc && !lc && !bc) bullets.push('No issues found -- schedule already follows all rules');
    bullets.push('Recommended for most situations -- good balance of convenience and minimal disruption');
  } else if(strategy === 'minimal'){
    bullets.push('Conservative approach: only fixes rule violations, no schedule rearranging');
    if(tc) bullets.push('Fixes ' + tc + ' teacher assignment' + (tc!==1?'s':'') + ' that violate studio policies');
    if(lc) bullets.push('Resolves ' + lc + ' same-level scheduling conflict' + (lc!==1?'s':''));
    bullets.push('Does NOT rearrange classes for bundling -- keeps current time slots');
    bullets.push('Best when you want the fewest possible changes to the existing schedule');
  } else if(strategy === 'maxbundle'){
    bullets.push('Aggressive approach: maximizes back-to-back bundling with extra style pairings');
    if(tc) bullets.push('Fixes ' + tc + ' teacher assignment' + (tc!==1?'s':'') + ' to match studio policies');
    if(lc) bullets.push('Resolves ' + lc + ' same-level conflict' + (lc!==1?'s':''));
    if(bc) bullets.push('Bundles ' + bc + ' class' + (bc!==1?'es':'') + ' including extra pairs: Jazz+Contemporary, Tap+Hip Hop, Ballet+Jazz');
    bullets.push('More changes but maximizes family convenience -- fewer separate trips per week');
  }
  let html = '<div style="background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:.6rem .85rem;margin-bottom:1rem;">';
  html += '<h4 style="font-size:.78rem;font-weight:600;margin-bottom:.4rem;">Strategy Summary</h4>';
  html += '<ul style="font-size:.72rem;color:var(--text-secondary);margin:0;padding-left:1.1rem;line-height:1.9;">';
  bullets.forEach(b => html += '<li>' + b + '</li>');
  html += '</ul></div>';
  return html;
}

function renderOptimize(){
  const view = document.getElementById('optimize-view');

  // Run all strategies
  STRATEGIES.forEach(s => {
    if(!optimizerProposals[s.id]) runOptimizer(s.id);
  });

  const proposal = optimizerProposals[activeStrategy];
  if(!proposal) return;
  const { proposed, changes } = proposal;

  const conflicts = getConflicts().filter(c=>!c.ignored);
  const teacherChanges = changes.filter(c => c.category === 'Teacher Rules');
  const levelChanges = changes.filter(c => c.category === 'Same-Level Conflicts');
  const bundleChanges = changes.filter(c => c.category === 'Class Bundling');

  const totalAccepted = Object.values(changeStates).filter(v=>v==='accepted').length;
  const totalRejected = Object.values(changeStates).filter(v=>v==='rejected').length;

  document.getElementById('nav-opt-count').textContent = changes.length;

  // Strategy tabs
  let html = '<div style="display:flex;gap:0;margin-bottom:1rem;border-bottom:2px solid var(--border);overflow-x:auto;">';
  STRATEGIES.forEach(s => {
    const ct = optimizerProposals[s.id]?.changes?.length || 0;
    const isActive = s.id === activeStrategy;
    html += '<div onclick="switchStrategy(\'' + s.id + '\')" style="padding:.5rem 1rem;cursor:pointer;font-size:.78rem;font-weight:' + (isActive?'700':'500') + ';color:' + (isActive?'var(--primary)':'var(--text-secondary)') + ';border-bottom:' + (isActive?'2px solid var(--primary)':'2px solid transparent') + ';margin-bottom:-2px;white-space:nowrap;transition:all .15s;">' +
      s.label + ' <span style="background:' + (isActive?'var(--primary)':'#E2E8F0') + ';color:' + (isActive?'#fff':'var(--text-secondary)') + ';font-size:.6rem;padding:.1rem .35rem;border-radius:8px;margin-left:.25rem;">' + ct + '</span>' +
    '</div>';
  });
  html += '</div>';

  // Strategy summary bullets
  html += getStrategySummary(activeStrategy, teacherChanges, levelChanges, bundleChanges);

  if(!changes.length){
    html += '<div class="opt-hero">' +
      '<h3>Schedule Analysis Complete</h3>' +
      '<p>Your schedule looks great! No optimization suggestions for this strategy.</p>' +
      '<div class="opt-stats"><div class="opt-stat"><div class="num">' + state.schedule.length + '</div><div class="lbl">Assigned</div></div>' +
      '<div class="opt-stat"><div class="num">' + getUnassigned().length + '</div><div class="lbl">Unassigned</div></div>' +
      '<div class="opt-stat"><div class="num">' + conflicts.length + '</div><div class="lbl">Conflicts</div></div></div></div>' +
      '<div class="opt-empty"><div class="opt-check">&#10004;</div>No changes suggested. The current schedule follows all rules.</div>';
    view.innerHTML = html;
    return;
  }

  html += '<div class="opt-hero">' +
    '<h3>AI Schedule Optimizer</h3>' +
    '<p>Analyzed ' + state.schedule.length + ' classes against Raynor\'s rules. Found <strong style="color:#F59E0B">' + changes.length + ' suggested change' + (changes.length!==1?'s':'') + '</strong> to improve the schedule.</p>' +
    '<div class="opt-stats">' +
      '<div class="opt-stat"><div class="num" style="color:#F59E0B">' + changes.length + '</div><div class="lbl">Suggestions</div></div>' +
      (teacherChanges.length ? '<div class="opt-stat"><div class="num" style="color:#A855F7">' + teacherChanges.length + '</div><div class="lbl">Teacher Fixes</div></div>' : '') +
      (levelChanges.length ? '<div class="opt-stat"><div class="num" style="color:#EF4444">' + levelChanges.length + '</div><div class="lbl">Level Conflicts</div></div>' : '') +
      (bundleChanges.length ? '<div class="opt-stat"><div class="num" style="color:#3B82F6">' + bundleChanges.length + '</div><div class="lbl">Bundle Moves</div></div>' : '') +
      '<div class="opt-stat"><div class="num" style="color:#22C55E">' + totalAccepted + '</div><div class="lbl">Accepted</div></div>' +
    '</div></div>';

  html += '<div class="opt-actions">' +
    '<button class="btn btn-primary" onclick="acceptAllChanges()">&#10004; Accept All ' + changes.length + ' Changes</button>' +
    '<button class="btn btn-outline" onclick="rerunOptimizer()">&#8635; Re-analyze</button>' +
    (totalAccepted > 0 ? '<button class="btn btn-warning" onclick="applyAccepted()">&#9889; Apply ' + totalAccepted + ' Accepted Changes</button>' : '') +
    '</div>';

  function renderCategory(label, icon, items){
    if(!items.length) return '';
    let s = '<div class="change-section"><h4>' + icon + ' ' + label + ' <span class="cs-count">' + items.length + '</span></h4>';
    items.forEach(c => {
      const st = changeStates[c.id] || '';
      const iconClass = c.type === 'teacher' ? 'teacher' : (c.type === 'bundle' ? 'bundle' : (c.type === 'move' ? 'move' : 'fix'));
      const iconEmoji = c.type === 'teacher' ? '&#128101;' : (c.type === 'bundle' ? '&#128279;' : '&#8596;');
      s += '<div class="change-card ' + st + '">' +
        '<div class="cc-top">' +
          '<div class="cc-icon ' + iconClass + '">' + iconEmoji + '</div>' +
          '<div class="cc-title">' + c.title + '</div>' +
          '<div class="cc-actions">' +
            (st !== 'accepted' ? '<button class="btn btn-sm btn-primary" onclick="acceptChange(' + c.id + ')">Accept</button>' : '<button class="btn btn-sm btn-outline" onclick="undoChangeState(' + c.id + ')">Undo</button>') +
            (st !== 'rejected' ? '<button class="btn btn-sm btn-outline" onclick="rejectChange(' + c.id + ')">Skip</button>' : '<button class="btn btn-sm btn-outline" onclick="undoChangeState(' + c.id + ')">Undo</button>') +
          '</div>' +
        '</div>' +
        '<div class="cc-reason">' + c.reason + '</div>' +
        '<div class="cc-diff">' +
          '<div class="cc-before">' + c.before + '</div>' +
          '<div class="cc-arrow">&#10132;</div>' +
          '<div class="cc-after">' + c.after + '</div>' +
        '</div>' +
      '</div>';
    });
    s += '</div>';
    return s;
  }

  html += renderCategory('Teacher Rule Fixes', '&#128101;', teacherChanges);
  html += renderCategory('Same-Level Conflict Resolution', '&#9888;&#65039;', levelChanges);
  html += renderCategory('Class Bundling (Back-to-Back)', '&#128279;', bundleChanges);

  // Rules reference
  html += '<div style="background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:.75rem;margin-top:1rem;">' +
    '<h4 style="font-size:.78rem;font-weight:600;margin-bottom:.5rem;">&#128218; Rules Applied</h4>' +
    '<ul style="font-size:.7rem;color:var(--text-secondary);margin:0;padding-left:1.2rem;line-height:1.8;">' +
    '<li><strong>No same levels at the same time</strong> -- e.g. two Junior L2 classes can\'t overlap</li>' +
    '<li><strong>Bundle Tap + Jazz back-to-back</strong> for each level group</li>' +
    '<li><strong>Bundle Ballet + Contemporary (+ Hip Hop)</strong> back-to-back for each level group</li>' +
    '<li><strong>Hip Hop can be standalone</strong> if bundling isn\'t possible</li>' +
    '<li><strong>Paige and Cami</strong> teach minis and munchkins</li>' +
    '<li><strong>Luke</strong> teaches Level 1 and up; all upper level hip hop</li>' +
    '</ul></div>';

  view.innerHTML = html;
}

function switchStrategy(id){
  activeStrategy = id;
  changeStates = {};
  renderOptimize();
}

function acceptChange(id){ changeStates[id] = 'accepted'; renderOptimize(); }
function rejectChange(id){ changeStates[id] = 'rejected'; renderOptimize(); }
function undoChangeState(id){ delete changeStates[id]; renderOptimize(); }
function acceptAllChanges(){
  const proposal = optimizerProposals[activeStrategy];
  if(!proposal) return;
  proposal.changes.forEach(c => { changeStates[c.id] = 'accepted'; });
  renderOptimize();
}
function rerunOptimizer(){
  optimizerProposals = {};
  changeStates = {};
  STRATEGIES.forEach(s => runOptimizer(s.id));
  renderOptimize();
  toast('Schedule re-analyzed');
}
function applyAccepted(){
  const proposal = optimizerProposals[activeStrategy];
  if(!proposal) return;
  const accepted = proposal.changes.filter(c => changeStates[c.id] === 'accepted');
  if(!accepted.length){ toast('No changes accepted yet'); return; }
  if(!confirm('Apply ' + accepted.length + ' accepted change(s) to the schedule? This will modify your current schedule.')) return;
  pushUndo();
  // Apply the accepted changes from the proposal
  accepted.forEach(c => {
    const sched = state.schedule[c.schedIdx];
    const proposedSched = proposal.proposed[c.schedIdx];
    if(!sched || !proposedSched) return;
    sched.teacherId = proposedSched.teacherId;
    sched.day = proposedSched.day;
    sched.startTime = proposedSched.startTime;
    sched.room = proposedSched.room;
  });
  optimizerProposals = {};
  changeStates = {};
  saveAndRender();
  toast(accepted.length + ' change(s) applied!');
}
