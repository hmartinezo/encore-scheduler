function exportExcel(){
  // XML Spreadsheet 2003 format (natively opened by Excel)
  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  xml += '<?mso-application progid="Excel.Sheet"?>\n';
  xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';
  xml += '<Styles>\n';
  xml += '<Style ss:ID="header"><Font ss:Bold="1" ss:Size="11"/><Interior ss:Color="#4472C4" ss:Pattern="Solid"/><Font ss:Color="#FFFFFF" ss:Bold="1"/></Style>\n';
  xml += '<Style ss:ID="default"><Font ss:Size="10"/></Style>\n';
  xml += '</Styles>\n';

  // Schedule sheet
  xml += '<Worksheet ss:Name="Schedule">\n<Table>\n';
  xml += '<Column ss:Width="200"/><Column ss:Width="100"/><Column ss:Width="60"/><Column ss:Width="150"/><Column ss:Width="100"/><Column ss:Width="100"/><Column ss:Width="100"/><Column ss:Width="100"/>\n';
  xml += '<Row ss:StyleID="header"><Cell><Data ss:Type="String">Class</Data></Cell><Cell><Data ss:Type="String">Style</Data></Cell><Cell><Data ss:Type="String">Duration</Data></Cell><Cell><Data ss:Type="String">Teacher</Data></Cell><Cell><Data ss:Type="String">Day</Data></Cell><Cell><Data ss:Type="String">Start Time</Data></Cell><Cell><Data ss:Type="String">End Time</Data></Cell><Cell><Data ss:Type="String">Room</Data></Cell></Row>\n';

  const sorted = [...state.schedule].sort((a,b) => a.day - b.day || a.startTime - b.startTime);
  sorted.forEach(s => {
    const c = CLASSES.find(cc=>cc.id===s.classId);
    const t = teacherById(s.teacherId);
    if(!c) return;
    xml += '<Row ss:StyleID="default">';
    xml += '<Cell><Data ss:Type="String">' + escXml(c.name) + '</Data></Cell>';
    xml += '<Cell><Data ss:Type="String">' + escXml(STYLES[c.style]||c.style) + '</Data></Cell>';
    xml += '<Cell><Data ss:Type="Number">' + c.duration + '</Data></Cell>';
    xml += '<Cell><Data ss:Type="String">' + escXml(t?t.name:'') + '</Data></Cell>';
    xml += '<Cell><Data ss:Type="String">' + DAYS[s.day] + '</Data></Cell>';
    xml += '<Cell><Data ss:Type="String">' + minutesToTime(s.startTime) + '</Data></Cell>';
    xml += '<Cell><Data ss:Type="String">' + minutesToTime(s.startTime+c.duration) + '</Data></Cell>';
    xml += '<Cell><Data ss:Type="String">' + roomName(s.room) + '</Data></Cell>';
    xml += '</Row>\n';
  });
  xml += '</Table>\n</Worksheet>\n';

  // Unassigned sheet
  xml += '<Worksheet ss:Name="Unassigned">\n<Table>\n';
  xml += '<Column ss:Width="200"/><Column ss:Width="100"/><Column ss:Width="60"/><Column ss:Width="200"/>\n';
  xml += '<Row ss:StyleID="header"><Cell><Data ss:Type="String">Class</Data></Cell><Cell><Data ss:Type="String">Style</Data></Cell><Cell><Data ss:Type="String">Duration</Data></Cell><Cell><Data ss:Type="String">Eligible Teachers</Data></Cell></Row>\n';
  getUnassigned().forEach(c => {
    xml += '<Row ss:StyleID="default">';
    xml += '<Cell><Data ss:Type="String">' + escXml(c.name) + '</Data></Cell>';
    xml += '<Cell><Data ss:Type="String">' + escXml(STYLES[c.style]||c.style) + '</Data></Cell>';
    xml += '<Cell><Data ss:Type="Number">' + c.duration + '</Data></Cell>';
    xml += '<Cell><Data ss:Type="String">' + escXml(c.eligibleTeachers.map(id=>teacherShort(id)).join(', ')) + '</Data></Cell>';
    xml += '</Row>\n';
  });
  xml += '</Table>\n</Worksheet>\n';
  xml += '</Workbook>';

  downloadFile('encore-schedule.xlsx', xml, 'application/vnd.ms-excel');
  toast('Excel exported');
}

function escXml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function exportPDF(){
  window.print();
}

function importJSON(){
  document.getElementById('import-input').click();
}

function handleImport(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(data.schedule){
        pushUndo();
        state.schedule = data.schedule;
        if(data.availability) state.availability = data.availability;
        if(data.ignoredConflicts) state.ignoredConflicts = data.ignoredConflicts;
        state.schedule.forEach(s => {
          if(typeof s.room === 'number') s.room = ROOM_MAP_OLD[s.room] || 'fosse';
        });
        saveAndRender();
        toast('Schedule imported');
      }
    } catch(err){ toast('Invalid JSON file'); }
  };
  reader.readAsText(file);
}

function downloadFile(name, content, type){
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

function resetSchedule(){
  if(!confirm('Clear ALL class assignments? This cannot be undone.')) return;
  pushUndo();
  state.schedule = [];
  saveAndRender();
  toast('Schedule cleared');
}

// =============================================
// ASSIGN / EDIT MODAL
// =============================================
let editingScheduleIdx = -1;

function showAssignModal(classId, day, time){
  editingScheduleIdx = -1;
  const modal = document.getElementById('assign-modal');
  document.getElementById('assign-modal-title').textContent = 'Assign Class';
  document.getElementById('assign-modal-btn').textContent = 'Assign';
  document.getElementById('assign-modal-btn').onclick = doAssign;
  modal.classList.add('show');

  const filterTeacher = document.getElementById('filter-teacher').value;
  const filterRoom = document.getElementById('filter-room').value;

  const classSelect = document.getElementById('assign-class');
  let unassigned = getUnassigned();
  if(filterTeacher){
    unassigned = unassigned.filter(c => c.eligibleTeachers.includes(filterTeacher));
  }
  classSelect.innerHTML = unassigned.map(c => '<option value="' + c.id + '"' + (c.id===classId?' selected':'') + '>' + c.name + ' (' + c.duration + 'm)</option>').join('');
  classSelect.disabled = false;

  if(day !== undefined) document.getElementById('assign-day').value = day;
  if(time !== undefined) document.getElementById('assign-time').value = time;

  updateAssignTeachers();
  if(filterTeacher){
    document.getElementById('assign-teacher').value = filterTeacher;
  }
  classSelect.onchange = updateAssignTeachers;

  populateTimeDropdown(time);
  populateRoomDropdown(filterRoom || '');
}

function showEditAssignment(schedIdx){
  const sched = state.schedule[schedIdx];
  if(!sched) return;
  const cls = CLASSES.find(c=>c.id===sched.classId);
  if(!cls) return;

  editingScheduleIdx = schedIdx;
  const modal = document.getElementById('assign-modal');
  document.getElementById('assign-modal-title').textContent = 'Edit: ' + cls.name;
  document.getElementById('assign-modal-btn').textContent = 'Save Changes';
  document.getElementById('assign-modal-btn').onclick = doEditAssignment;
  modal.classList.add('show');

  const classSelect = document.getElementById('assign-class');
  classSelect.innerHTML = '<option value="' + cls.id + '">' + cls.name + ' (' + cls.duration + 'm)</option>';
  classSelect.disabled = true;

  const teacherSelect = document.getElementById('assign-teacher');
  teacherSelect.innerHTML = cls.eligibleTeachers.map(id => {
    const t = teacherById(id);
    return '<option value="' + id + '"' + (id===sched.teacherId?' selected':'') + '>' + (t?t.name:id) + '</option>';
  }).join('');

  document.getElementById('assign-day').value = sched.day;
  populateTimeDropdown(sched.startTime);
  populateRoomDropdown(sched.room);

  classSelect.onchange = null;
}

function populateTimeDropdown(selectedTime){
  const timeSelect = document.getElementById('assign-time');
  timeSelect.innerHTML = '';
  TIME_SLOTS.forEach(t => {
    timeSelect.innerHTML += '<option value="' + t + '"' + (t===selectedTime?' selected':'') + '>' + minutesToTime(t) + '</option>';
  });
}

function populateRoomDropdown(selectedRoom){
  const roomSelect = document.getElementById('assign-room');
  roomSelect.innerHTML = ROOMS.map(r =>
    '<option value="' + r.id + '"' + (r.id===selectedRoom?' selected':'') + '>' + r.name + '</option>'
  ).join('');
}

function updateAssignTeachers(){
  const classId = parseInt(document.getElementById('assign-class').value);
  const cls = CLASSES.find(c=>c.id===classId);
  const teacherSelect = document.getElementById('assign-teacher');
  if(!cls){ teacherSelect.innerHTML = '<option>Select a class first</option>'; return; }
  teacherSelect.innerHTML = cls.eligibleTeachers.map(id => {
    const t = teacherById(id);
    return '<option value="' + id + '">' + (t?t.name:id) + '</option>';
  }).join('');
}

function doAssign(){
  const classId = parseInt(document.getElementById('assign-class').value);
  const teacherId = document.getElementById('assign-teacher').value;
  const day = parseInt(document.getElementById('assign-day').value);
  const startTime = parseInt(document.getElementById('assign-time').value);
  const room = document.getElementById('assign-room').value;

  if(!classId || !teacherId) return;

  pushUndo();
  state.schedule.push({ classId, teacherId, day, startTime, room });
  closeModal();
  saveAndRender();
  toast('Class assigned!');
}

function doEditAssignment(){
  if(editingScheduleIdx < 0) return;
  const teacherId = document.getElementById('assign-teacher').value;
  const day = parseInt(document.getElementById('assign-day').value);
  const startTime = parseInt(document.getElementById('assign-time').value);
  const room = document.getElementById('assign-room').value;

  pushUndo();
  state.schedule[editingScheduleIdx].teacherId = teacherId;
  state.schedule[editingScheduleIdx].day = day;
  state.schedule[editingScheduleIdx].startTime = startTime;
  state.schedule[editingScheduleIdx].room = room;
  closeModal();
  saveAndRender();
  toast('Class updated!');
}

function closeModal(){
  document.getElementById('assign-modal').classList.remove('show');
  document.getElementById('edit-teacher-modal').classList.remove('show');
  editingScheduleIdx = -1;
}

// =============================================
// TAB SWITCHING
// =============================================
let activeTab = 'schedule';
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    activeTab = item.dataset.tab;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
    const tabEl = document.getElementById('tab-'+activeTab);
    if(tabEl) tabEl.style.display = 'flex';
    renderAll();
  });
});

// =============================================
// POPULATE FILTERS
// =============================================
function populateFilters(){
  const sel = document.getElementById('filter-teacher');
  const currentVal = sel.value;
  sel.innerHTML = '<option value="">All Teachers</option>';
  TEACHERS.forEach(t => sel.innerHTML += '<option value="' + t.id + '">' + t.name + '</option>');
  sel.value = currentVal || '';
  sel.onchange = () => renderAll();

  const roomSel = document.getElementById('filter-room');
  const currentRoom = roomSel.value;
  roomSel.innerHTML = '<option value="">All Rooms (6)</option>';
  ROOMS.forEach(r => roomSel.innerHTML += '<option value="' + r.id + '">' + r.name + '</option>');
  roomSel.value = currentRoom || '';
  roomSel.onchange = () => renderAll();
}

// =============================================
// RENDER ALL
// =============================================
function renderAll(){
  renderCalendar();
  renderUnassigned();
  if(activeTab === 'teachers') renderTeachers();
  if(activeTab === 'classes') renderClasses();
  if(activeTab === 'availability') renderAvailability();
  if(activeTab === 'conflicts') renderConflicts();
  if(activeTab === 'optimize'){ optimizerProposals = {}; renderOptimize(); }
  if(activeTab === 'export') renderExport();
  if(activeTab === 'unassigned') renderUnassignedPage();
}

// =============================================
// KEYBOARD SHORTCUTS
// =============================================
document.addEventListener('keydown', e => {
  if(e.ctrlKey && e.key === 'z'){ e.preventDefault(); undo(); }
  if(e.ctrlKey && e.key === 'y'){ e.preventDefault(); redo(); }
  if(e.key === 'Escape') closeModal();
});

// =============================================
// SEED SCHEDULE FROM AUTHORITATIVE DATA (2026-2027)
// =============================================
function seedFromTab3(){
  if(state.schedule.length > 0) return;
  SCHEDULE_DATA.forEach((d, i) => {
    state.schedule.push({
      classId: i + 1,
      teacherId: d.teacher,
      day: d.day,
      startTime: d.start,
      room: '',
    });
  });
  save();
}

// =============================================
// INIT
// =============================================
load();
seedFromTab3();
buildAvailabilityFromSchedule();
populateFilters();
renderAll();
</script>
