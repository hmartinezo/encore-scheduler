<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup 5 — Spreadsheet Power Schedule Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#FAFAFA;color:#1a1a1a;line-height:1.4;overflow:hidden;height:100vh;display:flex;flex-direction:column;}
::selection{background:#1A73E8;color:#fff;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:#F1F1F1;}
::-webkit-scrollbar-thumb{background:#BDBDBD;border-radius:1px;}
::-webkit-scrollbar-thumb:hover{background:#9E9E9E;}
::-webkit-scrollbar-corner{background:#F1F1F1;}

:root{
  --bg:#FAFAFA;--text:#1a1a1a;--muted:#5F6368;--border:#E0E0E0;
  --hover:#1A73E8;--selected:#E8F0FE;--header-bg:#F8F9FA;
  --row-h:26px;--font-data:12px;--font-mono:'JetBrains Mono',monospace;
  --c-jazz:#4285F4;--c-tap:#EA4335;--c-ballet:#AB47BC;--c-hiphop:#34A853;
  --c-contemp:#FBBC04;--c-combo:#7B1FA2;--c-broadway:#E91E63;--c-acting:#607D8B;
  --c-leaps:#FF6D00;--c-ballroom:#D81B60;--c-team:#009688;--c-voice:#9E9E9E;
}

/* TOOLBAR */
.toolbar{background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;height:36px;flex-shrink:0;gap:2px;}
.toolbar .logo{font-weight:700;font-size:13px;color:var(--text);white-space:nowrap;padding:0 8px;}
.toolbar .sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0;}
.tb-btn{height:28px;padding:0 10px;border:1px solid transparent;border-radius:4px;background:none;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.tb-btn:hover{background:#F1F3F4;color:var(--text);}
.tb-btn:active{background:#E8EAED;}
.tb-btn.active{background:var(--selected);color:var(--hover);border-color:#C2D9FC;}
.tb-btn svg{width:14px;height:14px;fill:currentColor;}
.tb-group{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.tb-group .tb-btn{border:none;border-radius:0;border-right:1px solid var(--border);}
.tb-group .tb-btn:last-child{border-right:none;}
.toolbar .spacer{flex:1;}
.toolbar .stats{font-size:11px;color:var(--muted);font-family:var(--font-mono);white-space:nowrap;}
.conflict-badge{background:#EA4335;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;cursor:pointer;border:none;font-family:inherit;}
.conflict-badge:hover{background:#C62828;}

/* FORMULA BAR */
.formula-bar{background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;height:28px;flex-shrink:0;}
.cell-ref{width:100px;height:28px;border-right:1px solid var(--border);padding:0 8px;font:500 11px var(--font-mono);color:var(--text);display:flex;align-items:center;background:var(--header-bg);user-select:none;flex-shrink:0;}
.fx-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font:italic 600 12px var(--font-mono);color:var(--muted);border-right:1px solid var(--border);flex-shrink:0;}
.formula-input{flex:1;height:28px;border:none;padding:0 8px;font:12px var(--font-mono);color:var(--text);background:#fff;outline:none;}
.formula-input::placeholder{color:#BDBDBD;}

/* GRID WRAPPER */
.grid-wrap{flex:1;overflow:auto;position:relative;}

/* SCHEDULE TABLE */
.sched-table{border-collapse:collapse;width:max-content;min-width:100%;}
.sched-table th,.sched-table td{border:1px solid var(--border);padding:0 4px;font-size:var(--font-data);height:var(--row-h);line-height:var(--row-h);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;}
.sched-table thead th{background:var(--header-bg);font-weight:600;color:var(--muted);position:sticky;top:0;z-index:10;text-align:center;font-size:11px;height:28px;line-height:28px;}
.sched-table .time-col{width:56px;min-width:56px;max-width:56px;position:sticky;left:0;z-index:11;background:var(--header-bg);font:500 11px var(--font-mono);color:var(--muted);text-align:right;padding-right:6px;user-select:none;}
.sched-table thead .time-col{z-index:12;}
.sched-table .day-col{min-width:180px;cursor:cell;position:relative;}
.sched-table td.day-col:hover{outline:2px solid var(--hover);outline-offset:-2px;z-index:5;}
.sched-table td.selected{background:var(--selected);outline:2px solid var(--hover);outline-offset:-2px;z-index:5;}
.sched-table tr.hour-mark td,.sched-table tr.hour-mark th{border-top:2px solid #BDBDBD;}

/* Cell blocks */
.cell-block{display:inline-flex;align-items:center;gap:3px;max-width:100%;overflow:hidden;padding:0 2px;border-radius:2px;cursor:pointer;}
.cell-block .cb-name{font:500 var(--font-data) var(--font-mono);overflow:hidden;text-overflow:ellipsis;}
.cell-block .cb-init{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font:600 8px var(--font-mono);color:#fff;flex-shrink:0;}
.cell-block .cb-room{font:400 10px var(--font-mono);color:var(--muted);flex-shrink:0;}
td.conflict-cell{background:#FFEBEE !important;}
td.conflict-cell .cb-name{color:#C62828;}

/* DATA TABLES */
.data-table{border-collapse:collapse;width:100%;font-size:var(--font-data);}
.data-table th{background:var(--header-bg);font-weight:600;color:var(--muted);text-align:left;position:sticky;top:0;z-index:5;height:28px;padding:0 8px;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;font-size:11px;}
.data-table th:hover{background:#ECEFF1;}
.data-table th .sort-arrow{font-size:9px;margin-left:3px;opacity:.5;}
.data-table td{padding:0 8px;height:var(--row-h);border-bottom:1px solid #F0F0F0;font-family:var(--font-mono);}
.data-table tr:hover td{background:#F5F5F5;}
.data-table tr.conflict-row td{background:#FFF3F0;}
.style-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle;}

/* AVAILABILITY GRID */
.avail-wrap{padding:8px;overflow:auto;flex:1;}
.avail-controls{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.avail-controls select{font:12px var(--font-mono);padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:#fff;}
.avail-controls label{font-size:11px;color:var(--muted);}
.avail-table{border-collapse:collapse;}
.avail-table th{background:var(--header-bg);font-size:11px;font-weight:600;color:var(--muted);padding:2px 8px;height:24px;border:1px solid var(--border);}
.avail-table td{width:40px;height:20px;border:1px solid var(--border);cursor:pointer;transition:background .1s;}
.avail-table td.avail-on{background:#C8E6C9;}
.avail-table td.avail-off{background:#FFCDD2;}
.avail-table td:hover{outline:2px solid var(--hover);outline-offset:-1px;z-index:2;position:relative;}
.avail-table .av-time{font:11px var(--font-mono);color:var(--muted);padding-right:6px;text-align:right;width:50px;cursor:default;}

/* EXPORT VIEW */
.export-view{padding:24px;display:flex;flex-wrap:wrap;gap:12px;align-content:flex-start;}
.export-card{border:1px solid var(--border);border-radius:6px;padding:16px 20px;background:#fff;cursor:pointer;width:200px;text-align:center;transition:box-shadow .15s;}
.export-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);}
.export-card .ec-icon{font-size:24px;margin-bottom:6px;}
.export-card .ec-title{font-size:13px;font-weight:600;}
.export-card .ec-desc{font-size:11px;color:var(--muted);margin-top:2px;}

/* TAB PANELS */
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tab-panel.active{display:flex;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:8px;width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:14px;font-weight:600;}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:4px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:16px;}
.modal-body .field{margin-bottom:12px;}
.modal-body .field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.modal-body .field select,.modal-body .field input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font:13px var(--font-mono);background:#fff;}
.modal-body .field select:focus,.modal-body .field input:focus{outline:none;border-color:var(--hover);box-shadow:0 0 0 2px rgba(26,115,232,.15);}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.btn{padding:6px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);font-family:inherit;}
.btn:hover{background:#F5F5F5;}
.btn.primary{background:var(--hover);color:#fff;border-color:var(--hover);}
.btn.primary:hover{background:#1557B0;}
.btn.danger{background:#EA4335;color:#fff;border-color:#EA4335;}
.btn.danger:hover{background:#C62828;}

/* CONTEXT MENU */
.ctx-menu{position:fixed;background:#fff;border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:200;min-width:160px;padding:4px 0;display:none;font-size:12px;}
.ctx-menu .ctx-item{padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.ctx-menu .ctx-item:hover{background:#F1F3F4;}
.ctx-menu .ctx-item.danger{color:#EA4335;}
.ctx-menu .ctx-sep{height:1px;background:var(--border);margin:4px 0;}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="logo">Encore Schedule</span>
  <span class="sep"></span>
  <button class="tb-btn" onclick="undo()" title="Ctrl+Z"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>Undo</button>
  <button class="tb-btn" onclick="redo()" title="Ctrl+Y"><svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>Redo</button>
  <button class="tb-btn" onclick="openAssignModal()" title="Assign class">+ Assign</button>
  <button class="tb-btn" onclick="resetSchedule()">Clear</button>
  <span class="sep"></span>
  <div class="tb-group" id="viewTabs">
    <button class="tb-btn active" data-view="schedule">Schedule</button>
    <button class="tb-btn" data-view="classes">Classes</button>
    <button class="tb-btn" data-view="teachers">Teachers</button>
    <button class="tb-btn" data-view="availability">Availability</button>
    <button class="tb-btn" data-view="conflicts">Conflicts</button>
    <button class="tb-btn" data-view="export">Export</button>
  </div>
  <span class="spacer"></span>
  <span class="stats" id="statsBar"></span>
  <button class="conflict-badge" id="conflictBadge" onclick="switchView('conflicts')" style="display:none"></button>
</div>

<!-- FORMULA BAR -->
<div class="formula-bar">
  <div class="cell-ref" id="cellRef">&mdash;</div>
  <div class="fx-icon">fx</div>
  <input class="formula-input" id="formulaInput" placeholder="Select a cell to view details" readonly>
</div>

<!-- TAB PANELS -->
<div class="tab-panel active" id="panel-schedule">
  <div class="grid-wrap" id="gridWrap"></div>
</div>
<div class="tab-panel" id="panel-classes">
  <div class="grid-wrap" id="classesWrap"></div>
</div>
<div class="tab-panel" id="panel-teachers">
  <div class="grid-wrap" id="teachersWrap"></div>
</div>
<div class="tab-panel" id="panel-availability">
  <div class="avail-wrap" id="availWrap"></div>
</div>
<div class="tab-panel" id="panel-conflicts">
  <div class="grid-wrap" id="conflictsWrap"></div>
</div>
<div class="tab-panel" id="panel-export">
  <div class="export-view" id="exportView">
    <div class="export-card" onclick="exportCSV()"><div class="ec-icon">&#x1F4CA;</div><div class="ec-title">Export CSV</div><div class="ec-desc">Spreadsheet-compatible format</div></div>
    <div class="export-card" onclick="exportJSON()"><div class="ec-icon">{ }</div><div class="ec-title">Export JSON</div><div class="ec-desc">Full state with all data</div></div>
    <div class="export-card" onclick="navigator.clipboard.writeText(buildClipboard());toast('Copied')"><div class="ec-icon">&#x1F4CB;</div><div class="ec-title">Copy to Clipboard</div><div class="ec-desc">Tab-separated for pasting</div></div>
    <div class="export-card" onclick="window.print()"><div class="ec-icon">&#x1F5A8;</div><div class="ec-title">Print</div><div class="ec-desc">Print current view</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">Assign Class</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctxMenu"></div>

<script src="core.js"></script>
<script>
// ===== GLOBALS =====
let currentView = 'schedule';
let selectedCell = null;
let selectedScheduleIdx = null;
let clipboard = null;
let classesSortCol = 0, classesSortAsc = true;
let teachersSortCol = 0, teachersSortAsc = true;
let availTeacher = TEACHERS[0].id;
let paintMode = null;

const STYLE_COLORS = {jazz:'#4285F4',tap:'#EA4335',ballet:'#AB47BC',hiphop:'#34A853',contemp:'#FBBC04',combo:'#7B1FA2',broadway:'#E91E63',acting:'#607D8B',leaps:'#FF6D00',ballroom:'#D81B60',team:'#009688',voice:'#9E9E9E'};

function styleColor(s){ return STYLE_COLORS[s] || '#9E9E9E'; }
function classAbbrev(name){
  return name.replace(/Age /g,'').replace(/Level /g,'L').replace(/ & /g,'&').replace(/Contemporary/g,'Cont').replace(/Broadway Bound/g,'Bway').replace(/Leaps & Turns/g,'L&T').replace(/Hip Hop/g,'HH').replace(/Jazz\/Tap/g,'J/T').replace(/Jazz\/Ballet/g,'J/B').replace(/ - 90 min/g,' 90').replace(/ - 60 min/g,' 60').replace(/ with pointe after/g,'+Pt');
}

// ===== VIEW SWITCHING =====
function switchView(v){
  currentView = v;
  document.querySelectorAll('#viewTabs .tb-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + v));
  renderAll();
}
document.querySelectorAll('#viewTabs .tb-btn').forEach(b => b.addEventListener('click', () => switchView(b.dataset.view)));

// ===== RENDER ALL =====
function renderAll(){
  renderStats();
  if(currentView === 'schedule') renderSchedule();
  else if(currentView === 'classes') renderClasses();
  else if(currentView === 'teachers') renderTeachers();
  else if(currentView === 'availability') renderAvailability();
  else if(currentView === 'conflicts') renderConflicts();
}

// ===== STATS =====
function renderStats(){
  const assigned = state.schedule.length;
  const total = CLASSES.length;
  const conflicts = getConflicts();
  document.getElementById('statsBar').textContent = total + ' classes \u00B7 ' + assigned + ' assigned \u00B7 ' + TEACHERS.length + ' teachers';
  const badge = document.getElementById('conflictBadge');
  if(conflicts.length){ badge.style.display = 'inline'; badge.textContent = conflicts.length + ' conflict' + (conflicts.length>1?'s':''); }
  else badge.style.display = 'none';
}

// ===== SCHEDULE GRID =====
function renderSchedule(){
  const wrap = document.getElementById('gridWrap');
  const grid = {};
  state.schedule.forEach((s, idx) => {
    const cls = CLASSES.find(c => c.id === s.classId);
    if(!cls) return;
    const key = s.day + '_' + s.startTime;
    if(!grid[key]) grid[key] = [];
    grid[key].push({ idx, s, cls });
  });

  let html = '<table class="sched-table"><thead><tr><th class="time-col">Time</th>';
  DAYS.forEach((d,i) => html += '<th class="day-col">' + DAY_SHORT[i] + '</th>');
  html += '</tr></thead><tbody>';

  TIME_SLOTS.forEach((time, si) => {
    const isHour = time % 60 === 0;
    html += '<tr' + (isHour ? ' class="hour-mark"' : '') + '>';
    html += '<th class="time-col">' + minutesToTimeShort(time) + '</th>';
    DAYS.forEach((d, di) => {
      if(!isTimeInDay(time, di)){
        html += '<td class="day-col" style="background:#F5F5F5;"></td>';
        return;
      }
      const key = di + '_' + time;
      const items = grid[key] || [];
      const isSel = selectedCell && selectedCell.day === di && selectedCell.time === time;
      const hasConflict = items.some(it => isConflict(it.idx));
      let tdCls = 'day-col';
      if(isSel) tdCls += ' selected';
      if(hasConflict) tdCls += ' conflict-cell';
      html += '<td class="' + tdCls + '" data-day="' + di + '" data-time="' + time + '" data-slot="' + si + '">';
      items.forEach(it => {
        const t = teacherById(it.s.teacherId);
        const sc = styleColor(it.cls.style);
        html += '<span class="cell-block" data-idx="' + it.idx + '" style="background:' + sc + '14;border-left:3px solid ' + sc + '">';
        html += '<span class="cb-init" style="background:' + (t ? t.color : '#999') + '">' + teacherInitials(it.s.teacherId) + '</span>';
        html += '<span class="cb-name">' + classAbbrev(it.cls.name) + '</span>';
        html += '<span class="cb-room">R' + it.s.room + '</span>';
        html += '</span>';
      });
      html += '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;

  wrap.querySelectorAll('td.day-col').forEach(td => {
    td.addEventListener('click', e => selectCell(td, e));
    td.addEventListener('dblclick', e => dblClickCell(td, e));
    td.addEventListener('contextmenu', e => contextMenuCell(td, e));
  });
}

function selectCell(td){
  const day = +td.dataset.day, time = +td.dataset.time, si = +td.dataset.slot;
  selectedCell = { day: day, time: time, slotIdx: si };
  const block = td.querySelector('.cell-block');
  selectedScheduleIdx = block ? +block.dataset.idx : null;
  updateFormulaBar();
  document.querySelectorAll('td.selected').forEach(c => c.classList.remove('selected'));
  td.classList.add('selected');
}

function updateFormulaBar(){
  const ref = document.getElementById('cellRef');
  const inp = document.getElementById('formulaInput');
  if(!selectedCell){ ref.textContent = '\u2014'; inp.value = ''; return; }
  ref.textContent = DAY_SHORT[selectedCell.day] + ' ' + minutesToTimeShort(selectedCell.time);
  if(selectedScheduleIdx !== null){
    const s = state.schedule[selectedScheduleIdx];
    const cls = CLASSES.find(c => c.id === s.classId);
    const t = teacherById(s.teacherId);
    inp.value = (cls ? cls.name : '?') + ' | ' + (t ? t.name : '?') + ' | Room ' + s.room + ' | ' + minutesToTime(s.startTime) + '-' + minutesToTime(s.startTime + (cls ? cls.duration : 60));
  } else {
    inp.value = '(empty)';
  }
}

function dblClickCell(td){
  const block = td.querySelector('.cell-block');
  if(block){
    openEditModal(+block.dataset.idx);
  } else {
    const day = +td.dataset.day, time = +td.dataset.time;
    if(isTimeInDay(time, day)) openAssignModal(day, time);
  }
}

// ===== CONTEXT MENU =====
function contextMenuCell(td, e){
  e.preventDefault();
  selectCell(td);
  const menu = document.getElementById('ctxMenu');
  let html = '';
  if(selectedScheduleIdx !== null){
    html += '<div class="ctx-item" onclick="openEditModal(' + selectedScheduleIdx + ');hideCtx()">&#9998; Edit</div>';
    html += '<div class="ctx-item" onclick="copyCell();hideCtx()">&#128203; Copy</div>';
    html += '<div class="ctx-sep"></div>';
    html += '<div class="ctx-item danger" onclick="removeCell(' + selectedScheduleIdx + ');hideCtx()">&#10005; Remove</div>';
  } else {
    html += '<div class="ctx-item" onclick="openAssignModal(' + td.dataset.day + ',' + td.dataset.time + ');hideCtx()">+ Assign here</div>';
  }
  if(clipboard){
    html += '<div class="ctx-item" onclick="pasteCell();hideCtx()">&#128203; Paste</div>';
  }
  menu.innerHTML = html;
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.style.display = 'block';
}
function hideCtx(){ document.getElementById('ctxMenu').style.display = 'none'; }
document.addEventListener('click', function(e){ if(!e.target.closest('.ctx-menu')) hideCtx(); });

function copyCell(){
  if(selectedScheduleIdx === null) return;
  clipboard = JSON.parse(JSON.stringify(state.schedule[selectedScheduleIdx]));
  toast('Copied');
}
function pasteCell(){
  if(!clipboard || !selectedCell) return;
  pushUndo();
  const p = Object.assign({}, clipboard, { day: selectedCell.day, startTime: selectedCell.time });
  state.schedule.push(p);
  saveState(); renderAll(); toast('Pasted');
}
function removeCell(idx){
  pushUndo();
  state.schedule.splice(idx, 1);
  selectedScheduleIdx = null;
  saveState(); renderAll(); toast('Removed');
}

// ===== CLASSES TABLE =====
function renderClasses(){
  const cols = ['ID','Class Name','Style','Duration','Teacher(s)','Day','Time','Room','Status'];
  const rows = CLASSES.map(function(cls){
    const entry = state.schedule.find(function(s){ return s.classId === cls.id; });
    const sidx = entry ? state.schedule.indexOf(entry) : -1;
    return {
      id: cls.id,
      name: cls.name,
      style: STYLES[cls.style] || cls.style,
      styleKey: cls.style,
      duration: cls.duration,
      teacher: entry ? (teacherById(entry.teacherId) ? teacherById(entry.teacherId).short : '?') : '',
      day: entry ? DAY_SHORT[entry.day] : '',
      time: entry ? minutesToTimeShort(entry.startTime) : '',
      room: entry ? 'R' + entry.room : '',
      status: entry ? (isConflict(sidx) ? 'CONFLICT' : 'Assigned') : 'Unassigned',
      sidx: sidx
    };
  });
  var sortKeys = ['id','name','style','duration','teacher','day','time','room','status'];
  var sortKey = sortKeys[classesSortCol];
  rows.sort(function(a,b){
    var va = a[sortKey], vb = b[sortKey];
    if(typeof va === 'number') return classesSortAsc ? va - vb : vb - va;
    return classesSortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });

  let html = '<table class="data-table"><thead><tr>';
  cols.forEach(function(c,i){
    var arrow = classesSortCol === i ? (classesSortAsc ? ' \u25B2' : ' \u25BC') : '';
    html += '<th onclick="sortClasses(' + i + ')">' + c + '<span class="sort-arrow">' + arrow + '</span></th>';
  });
  html += '</tr></thead><tbody>';
  rows.forEach(function(r){
    var rc = r.status === 'CONFLICT' ? ' class="conflict-row"' : '';
    html += '<tr' + rc + '>';
    html += '<td>' + r.id + '</td>';
    html += '<td>' + r.name + '</td>';
    html += '<td><span class="style-dot" style="background:' + styleColor(r.styleKey) + '"></span>' + r.style + '</td>';
    html += '<td>' + r.duration + 'm</td>';
    html += '<td>' + r.teacher + '</td>';
    html += '<td>' + r.day + '</td>';
    html += '<td>' + r.time + '</td>';
    html += '<td>' + r.room + '</td>';
    var stColor = r.status==='CONFLICT' ? '#C62828' : r.status==='Unassigned' ? '#F9A825' : '#2E7D32';
    html += '<td style="color:' + stColor + ';font-weight:600">' + r.status + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('classesWrap').innerHTML = html;
}
function sortClasses(col){ if(classesSortCol===col) classesSortAsc=!classesSortAsc; else { classesSortCol=col; classesSortAsc=true; } renderClasses(); }

// ===== TEACHERS TABLE =====
function renderTeachers(){
  var cols = ['Teacher','Styles','Classes','Hours','Conflicts'];
  var rows = TEACHERS.map(function(t){
    var entries = state.schedule.filter(function(s){ return s.teacherId === t.id; });
    var totalMin = entries.reduce(function(sum, s){ var c = CLASSES.find(function(cc){ return cc.id === s.classId; }); return sum + (c ? c.duration : 0); }, 0);
    var conflictCount = entries.filter(function(s){ return isConflict(state.schedule.indexOf(s)); }).length;
    return { id: t.id, name: t.short, color: t.color, styles: t.styles.map(function(s){ return STYLES[s] || s; }).join(', '), count: entries.length, hours: (totalMin / 60).toFixed(1), conflicts: conflictCount };
  });
  var sortKeys = ['name','styles','count','hours','conflicts'];
  var sortKey = sortKeys[teachersSortCol];
  rows.sort(function(a,b){
    var va = a[sortKey], vb = b[sortKey];
    if(!isNaN(+va)) return teachersSortAsc ? (+va) - (+vb) : (+vb) - (+va);
    return teachersSortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
  let html = '<table class="data-table"><thead><tr>';
  cols.forEach(function(c,i){
    var arrow = teachersSortCol === i ? (teachersSortAsc ? ' \u25B2' : ' \u25BC') : '';
    html += '<th onclick="sortTeachers(' + i + ')">' + c + '<span class="sort-arrow">' + arrow + '</span></th>';
  });
  html += '</tr></thead><tbody>';
  rows.forEach(function(r){
    html += '<tr>';
    html += '<td><span class="style-dot" style="background:' + r.color + '"></span>' + r.name + '</td>';
    html += '<td>' + r.styles + '</td>';
    html += '<td>' + r.count + '</td>';
    html += '<td>' + r.hours + 'h</td>';
    html += '<td style="color:' + (r.conflicts ? '#C62828' : '#2E7D32') + ';font-weight:600">' + r.conflicts + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('teachersWrap').innerHTML = html;
}
function sortTeachers(col){ if(teachersSortCol===col) teachersSortAsc=!teachersSortAsc; else { teachersSortCol=col; teachersSortAsc=true; } renderTeachers(); }

// ===== AVAILABILITY GRID =====
function renderAvailability(){
  var wrap = document.getElementById('availWrap');
  let html = '<div class="avail-controls">';
  html += '<label>Teacher:</label><select id="availSelect" onchange="availTeacher=this.value;renderAvailability()">';
  TEACHERS.forEach(function(t){ html += '<option value="' + t.id + '"' + (t.id===availTeacher?' selected':'') + '>' + t.short + '</option>'; });
  html += '</select>';
  html += '<label style="margin-left:16px;font-size:10px;color:var(--muted)">Click to toggle, drag to paint</label>';
  html += '</div>';
  html += '<table class="avail-table"><thead><tr><th></th>';
  DAYS.forEach(function(d,i){ html += '<th>' + DAY_SHORT[i] + '</th>'; });
  html += '</tr></thead><tbody>';
  TIME_SLOTS.forEach(function(time){
    html += '<tr>';
    html += '<td class="av-time">' + minutesToTimeShort(time) + '</td>';
    DAYS.forEach(function(d,di){
      if(!isTimeInDay(time, di)){ html += '<td style="background:#EEEEEE"></td>'; return; }
      var on = isAvailable(availTeacher, di, time);
      html += '<td class="' + (on ? 'avail-on' : 'avail-off') + '" data-teacher="' + availTeacher + '" data-day="' + di + '" data-time="' + time + '"></td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;

  wrap.querySelectorAll('.avail-on, .avail-off').forEach(function(td){
    td.addEventListener('mousedown', function(e){ e.preventDefault(); paintMode = td.classList.contains('avail-on') ? 'off' : 'on'; toggleAvail(td); });
    td.addEventListener('mouseenter', function(){ if(paintMode) toggleAvail(td); });
  });
  document.addEventListener('mouseup', function(){ if(paintMode){ paintMode = null; saveState(); } });
}

function toggleAvail(td){
  var tid = td.dataset.teacher, day = +td.dataset.day, time = +td.dataset.time;
  var slots = state.availability[tid][day];
  if(paintMode === 'on'){
    if(!isAvailable(tid, day, time)){
      slots.push({ start: time, end: time + SLOT_MINUTES });
      mergeSlots(slots);
    }
    td.className = 'avail-on';
  } else {
    removeTimeFromSlots(slots, time);
    td.className = 'avail-off';
  }
}
function mergeSlots(slots){
  slots.sort(function(a,b){ return a.start - b.start; });
  for(var i = 0; i < slots.length - 1; ){
    if(slots[i].end >= slots[i+1].start){
      slots[i].end = Math.max(slots[i].end, slots[i+1].end);
      slots.splice(i+1, 1);
    } else i++;
  }
}
function removeTimeFromSlots(slots, time){
  for(var i = slots.length - 1; i >= 0; i--){
    var s = slots[i];
    if(time >= s.start && time < s.end){
      var before = { start: s.start, end: time };
      var after = { start: time + SLOT_MINUTES, end: s.end };
      slots.splice(i, 1);
      if(after.start < after.end) slots.push(after);
      if(before.start < before.end) slots.push(before);
      break;
    }
  }
}

// ===== CONFLICTS TABLE =====
function renderConflicts(){
  var conflicts = getConflicts();
  let html = '<table class="data-table"><thead><tr><th>Type</th><th>Description</th><th>Class A</th><th>Class B</th><th>Day</th><th>Time</th><th>Action</th></tr></thead><tbody>';
  if(!conflicts.length){
    html += '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted);font-family:Inter">No conflicts found</td></tr>';
  }
  conflicts.forEach(function(c){
    var sa = state.schedule[c.a], sb = state.schedule[c.b];
    var ca = CLASSES.find(function(cc){ return cc.id === sa.classId; });
    var cb = CLASSES.find(function(cc){ return cc.id === sb.classId; });
    html += '<tr class="conflict-row">';
    html += '<td style="color:#C62828;font-weight:600">' + (c.type === 'teacher' ? 'Teacher' : 'Room') + '</td>';
    html += '<td>' + c.msg + '</td>';
    html += '<td>' + (ca ? ca.name : '?') + '</td>';
    html += '<td>' + (cb ? cb.name : '?') + '</td>';
    html += '<td>' + DAY_SHORT[sa.day] + '</td>';
    html += '<td>' + minutesToTimeShort(sa.startTime) + '</td>';
    html += '<td><button class="btn" style="padding:2px 8px;font-size:11px" onclick="openEditModal(' + c.a + ')">Fix</button></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('conflictsWrap').innerHTML = html;
}

// ===== ASSIGN / EDIT MODAL =====
function openAssignModal(day, time){
  var unassigned = getUnassigned();
  document.getElementById('modalTitle').textContent = 'Assign Class';
  let html = '<div class="field"><label>Class</label><select id="mClass">';
  if(unassigned.length === 0) html += '<option value="">(all classes assigned)</option>';
  unassigned.forEach(function(c){ html += '<option value="' + c.id + '">' + c.name + ' (' + c.duration + 'm)</option>'; });
  html += '</select></div>';
  html += '<div class="field"><label>Teacher</label><select id="mTeacher">';
  TEACHERS.forEach(function(t){ html += '<option value="' + t.id + '">' + t.short + '</option>'; });
  html += '</select></div>';
  html += '<div class="field"><label>Day</label><select id="mDay">';
  DAYS.forEach(function(d,i){ html += '<option value="' + i + '"' + (day===i?' selected':'') + '>' + d + '</option>'; });
  html += '</select></div>';
  html += '<div class="field"><label>Start Time</label><input type="time" id="mTime" value="' + (time != null ? timeToInputVal(time) : '16:00') + '"></div>';
  html += '<div class="field"><label>Room</label><select id="mRoom">';
  for(var r=1;r<=6;r++) html += '<option value="' + r + '">Room ' + r + '</option>';
  html += '</select></div>';
  document.getElementById('modalBody').innerHTML = html;

  var mClass = document.getElementById('mClass');
  var mTeacher = document.getElementById('mTeacher');
  function updateTeacher(){
    var cls = CLASSES.find(function(c){ return c.id === +mClass.value; });
    if(cls && cls.eligibleTeachers.length) mTeacher.value = cls.eligibleTeachers[0];
  }
  mClass.addEventListener('change', updateTeacher);
  updateTeacher();

  document.getElementById('modalFooter').innerHTML = '<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="doAssign()">Assign</button>';
  document.getElementById('modalOverlay').classList.add('show');
}

function openEditModal(idx){
  var s = state.schedule[idx];
  if(!s) return;
  var cls = CLASSES.find(function(c){ return c.id === s.classId; });
  document.getElementById('modalTitle').textContent = 'Edit: ' + (cls ? cls.name : 'Class');
  let html = '<div class="field"><label>Class</label><input value="' + (cls ? cls.name : '?') + '" readonly style="background:#F5F5F5"></div>';
  html += '<div class="field"><label>Teacher</label><select id="mTeacher">';
  TEACHERS.forEach(function(t){ html += '<option value="' + t.id + '"' + (t.id===s.teacherId?' selected':'') + '>' + t.short + '</option>'; });
  html += '</select></div>';
  html += '<div class="field"><label>Day</label><select id="mDay">';
  DAYS.forEach(function(d,i){ html += '<option value="' + i + '"' + (i===s.day?' selected':'') + '>' + d + '</option>'; });
  html += '</select></div>';
  html += '<div class="field"><label>Start Time</label><input type="time" id="mTime" value="' + timeToInputVal(s.startTime) + '"></div>';
  html += '<div class="field"><label>Room</label><select id="mRoom">';
  for(var r=1;r<=6;r++) html += '<option value="' + r + '"' + (r===s.room?' selected':'') + '>Room ' + r + '</option>';
  html += '</select></div>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalFooter').innerHTML = '<button class="btn danger" onclick="removeCell(' + idx + ');closeModal()">Remove</button><span style="flex:1"></span><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="doEdit(' + idx + ')">Save</button>';
  document.getElementById('modalOverlay').classList.add('show');
}

function doAssign(){
  var classId = +document.getElementById('mClass').value;
  if(!classId){ toast('No class selected'); return; }
  var teacherId = document.getElementById('mTeacher').value;
  var day = +document.getElementById('mDay').value;
  var time = inputValToTime(document.getElementById('mTime').value);
  var room = +document.getElementById('mRoom').value;
  pushUndo();
  state.schedule.push({ classId: classId, teacherId: teacherId, day: day, startTime: time, room: room });
  saveState(); closeModal(); renderAll(); toast('Assigned');
}

function doEdit(idx){
  var s = state.schedule[idx];
  pushUndo();
  s.teacherId = document.getElementById('mTeacher').value;
  s.day = +document.getElementById('mDay').value;
  s.startTime = inputValToTime(document.getElementById('mTime').value);
  s.room = +document.getElementById('mRoom').value;
  saveState(); closeModal(); renderAll(); toast('Updated');
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }

function timeToInputVal(m){ return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0'); }
function inputValToTime(v){ var parts = v.split(':'); return (+parts[0])*60 + (+parts[1]); }

// ===== CLIPBOARD TEXT =====
function buildClipboard(){
  var txt = 'Class\tStyle\tDuration\tTeacher\tDay\tStart\tEnd\tRoom\n';
  state.schedule.forEach(function(s){
    var c = CLASSES.find(function(cc){ return cc.id === s.classId; });
    var t = teacherById(s.teacherId);
    if(!c) return;
    txt += c.name + '\t' + (STYLES[c.style]||c.style) + '\t' + c.duration + '\t' + (t?t.name:'') + '\t' + DAYS[s.day] + '\t' + minutesToTime(s.startTime) + '\t' + minutesToTime(s.startTime+c.duration) + '\t' + s.room + '\n';
  });
  return txt;
}

// ===== KEYBOARD =====
document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.key === 'z'){ e.preventDefault(); undo(); }
  else if(e.ctrlKey && e.key === 'y'){ e.preventDefault(); redo(); }
  else if(e.key === 'Escape') closeModal();
  else if(currentView === 'schedule' && selectedCell && !document.getElementById('modalOverlay').classList.contains('show')){
    if(e.key === 'ArrowDown'){ e.preventDefault(); navigateCell(0, 1); }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); navigateCell(0, -1); }
    else if(e.key === 'ArrowRight'){ e.preventDefault(); navigateCell(1, 0); }
    else if(e.key === 'ArrowLeft'){ e.preventDefault(); navigateCell(-1, 0); }
    else if(e.key === 'Delete' && selectedScheduleIdx !== null){ removeCell(selectedScheduleIdx); }
    else if(e.key === 'Enter' && selectedScheduleIdx !== null){ openEditModal(selectedScheduleIdx); }
  }
});

function navigateCell(dDay, dSlot){
  if(!selectedCell) return;
  var newDay = selectedCell.day + dDay;
  var newSlotIdx = selectedCell.slotIdx + dSlot;
  if(newDay < 0) newDay = 5;
  if(newDay > 5) newDay = 0;
  if(newSlotIdx < 0) newSlotIdx = 0;
  if(newSlotIdx >= TIME_SLOTS.length) newSlotIdx = TIME_SLOTS.length - 1;
  var td = document.querySelector('td[data-day="' + newDay + '"][data-slot="' + newSlotIdx + '"]');
  if(td) selectCell(td);
}

// ===== INIT =====
loadState();
seedFromTab3();
renderAll();
</script>
